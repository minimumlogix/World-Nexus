<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Nexus - Explore Fictional Worlds and AI Entities</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  
  <!-- Preload Critical CSS Variables & Core Layout -->
  <link rel="preload" href="css/variables.css" as="style">
  <link rel="preload" href="css/base.css" as="style">
  <link rel="preload" href="css/layout.css" as="style">

  <!-- Preload Core JS Orchestrator Modules -->
  <link rel="modulepreload" href="js/app.js">
  <link rel="modulepreload" href="js/core/Router.js">
  <link rel="modulepreload" href="js/core/EventBus.js">
  <link rel="modulepreload" href="js/core/StateManager.js">
  <link rel="modulepreload" href="js/core/Loader.js">

  <!-- Resource Hints: Establish early connections for external origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  
  <!-- Google Fonts: display=swap prevents FOIT; subset to only needed weights -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Cormorant+Garamond:wght@400;500;600;700&family=Crimson+Text:wght@400;600&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Core Design System Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Bootstrap Icons: load non-render-blocking via print media trick -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></noscript>
  
  <!-- Component Stylesheets -->
  <link rel="stylesheet" href="css/components/card.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/tags.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/search.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/footer.css">
  <link rel="stylesheet" href="css/components/breadcrumbs.css">
  <link rel="stylesheet" href="css/components/inline-panel.css">
  <link rel="stylesheet" href="css/components/spoiler.css">
  <link rel="stylesheet" href="css/components/chat.css">
  <link rel="stylesheet" href="css/components/mention.css">

  <!-- Page Stylesheets -->
  <link rel="stylesheet" href="css/pages/landing.css">
  <link rel="stylesheet" href="css/pages/world.css">
  <link rel="stylesheet" href="css/pages/bot.css">
  <link rel="stylesheet" href="css/pages/profile.css">
  <link rel="stylesheet" href="css/pages/settings.css">
  <link rel="stylesheet" href="css/pages/feed.css">
  <link rel="stylesheet" href="css/pages/inbox.css">
  <link rel="stylesheet" href="css/pages/engine.css">
</head>
<body class="dark-theme">
  <!-- Dynamic Loader overlay -->
  <div id="global-loader" class="global-loader">
    <div class="loader-spinner"></div>
  </div>

  <header id="main-header" class="main-header">
    <div class="header-container">
      <a href="index.html" class="logo-link" id="logo-link">
        <svg class="header-compass-logo spin-hover" viewBox="0 0 100 100" width="34" height="34" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" style="margin-right: 12px; filter: drop-shadow(0 0 4px rgba(212,175,55,0.4));">
          <defs>
            <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fef08a"/>
              <stop offset="50%" stop-color="#eab308"/>
              <stop offset="100%" stop-color="#854d0e"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="42" stroke="url(#gold-grad)" stroke-opacity="0.4"/>
          <circle cx="50" cy="50" r="28" stroke="url(#gold-grad)" stroke-opacity="0.3" stroke-dasharray="4,3"/>
          <line x1="50" y1="8" x2="50" y2="92" stroke="url(#gold-grad)" stroke-opacity="0.5"/>
          <line x1="8" y1="50" x2="92" y2="50" stroke="url(#gold-grad)" stroke-opacity="0.5"/>
          <polygon points="50,15 54,46 85,50 54,54 50,85 46,54 15,50 46,46" fill="url(#gold-grad)"/>
        </svg>
        <span class="logo-text">WORLD <span class="logo-accent">NEXUS</span></span>
      </a>
      
      <nav class="header-nav" id="desktop-nav">
        <a href="#/" class="nav-item">Explore</a>
        <a href="#/feed" class="nav-item">Feed</a>
        <a href="#/worlds" class="nav-item">Worlds</a>
        <a href="#/characters" class="nav-item">Characters</a>
        <a href="#/inbox" class="nav-item">Inbox <span class="nav-badge" id="inbox-badge" style="display: none;">0</span></a>
        <a href="#" class="nav-item" id="desktop-create-btn">Create</a>
      </nav>

      <div class="header-search-container" id="header-search-wrapper">
        <input type="text" id="global-search-input" placeholder="Search worlds & bots..." aria-label="Search">
      </div>

      <div class="header-actions">
        <button id="mobile-menu-toggle" class="mobile-menu-btn" aria-label="Open Navigation Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Menu Drawer -->
  <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile Navigation">
    <div class="mobile-nav-content">
      <ul class="mobile-nav-links">
        <li><a href="#/">Explore</a></li>
        <li><a href="#/feed">Feed</a></li>
        <li><a href="#/worlds">Worlds</a></li>
        <li><a href="#/characters">Characters</a></li>
        <li><a href="#/inbox">Inbox <span class="nav-badge" id="mobile-inbox-badge" style="display: none;">0</span></a></li>
        <li><a href="#" id="mobile-nav-create">Create</a></li>
      </ul>
      <div class="mobile-nav-stats">
        <div><strong id="mobile-stat-worlds">-</strong> Worlds</div>
        <div><strong id="mobile-stat-bots">-</strong> Bots Registered</div>
      </div>
    </div>
  </nav>

  <main id="app-root">
    <!-- Dynamic page content will render here -->
  </main>

  <footer class="main-footer">
    <div class="constellation-bg"></div>
    <div class="footer-container" style="position: relative; z-index: 2; justify-content: center; text-align: center;">
      <p style="color: var(--text-muted); font-size: var(--fs-sm);">&copy; 2026 World Nexus. v1.1.0, Made by 𝓞𝓭𝓲𝓷</p>
    </div>
  </footer>

  <!-- JSZip: ZIP bundle export for World Creation Engine -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" defer></script>

  <!-- Main Application Orchestrator -->
  <script type="module" src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('[Service Worker] Scope verified:', reg.scope))
          .catch((err) => console.warn('[Service Worker] Registry failure:', err));
      });
    }
  </script>
</body>
</html>
