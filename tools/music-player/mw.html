<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Video Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --accent: #00ffcc;
            --bg-glass: rgba(10, 12, 16, 0.75);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --bar-height: 75px;
            --grid-size: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: transparent;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Hidden audio engine — identical to mw.html */
        #video-frame {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* NASAPUNK WIDGET BASE */
        #nexus-player-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: var(--bar-height);
            background: var(--bg-glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            padding: 0 20px;
            padding-bottom: 6px;
            color: var(--text-main);
            z-index: 99999;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s ease;
        }

        /* Tactical Grid */
        #nexus-player-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none;
            z-index: -1;
        }

        #dynamic-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            filter: blur(15px) saturate(140%);
            z-index: -2;
            transition: background-image 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- LAYOUT SECTIONS --- */
        .section-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            min-width: 0;
        }

        .section-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex: 1.5;
            z-index: 10;
        }

        .section-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            flex: 1;
            z-index: 10;
        }

        /* --- LEFT: TELEMETRY --- */
        .status-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-glass);
            padding-right: 15px;
            height: 40px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 4s infinite;
        }

        .status-label {
            font-size: 8px;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 1px;
            font-weight: 700;
            transition: color 0.3s;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
        }

        .track-title-wrapper {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .track-title {
            font-size: 14px;
            font-weight: 800;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-main);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
            transition: transform 0.1s linear;
            padding-right: 50px;
        }

        .track-title.marquee {
            animation: marquee-scroll var(--duration, 10s) linear infinite;
        }

        @keyframes marquee-scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .credit {
            font-size: 9px;
            color: var(--accent);
            letter-spacing: 1px;
            margin-top: 2px;
            font-weight: 700;
            opacity: 0.7;
        }

        /* --- CENTER: CONTROLS & TIMING --- */
        .time-display {
            font-size: 11px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            width: 45px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
            padding: 5px;
        }

        .btn:hover {
            opacity: 1;
            color: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent));
            transform: scale(1.1);
        }

        .btn:active {
            transform: scale(0.9);
        }

        .btn-main {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 1px solid var(--border-glass);
            opacity: 1;
            backdrop-filter: blur(5px);
        }

        .btn-main:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* --- ABSOLUTE FULL-WIDTH PROGRESS BAR --- */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 20;
            transition: height 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-container:hover,
        .progress-container:active {
            height: 12px;
        }

        .progress-track {
            width: 100%;
            height: 100%;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            width: 0%;
            box-shadow: 0 0 15px var(--accent);
            pointer-events: none;
            will-change: width;
            transition: background-color 0.3s;
        }

        .progress-container:hover .progress-bar {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }

        /* --- RIGHT: MODULES & VOLUME --- */
        .btn-state-active {
            color: var(--accent);
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .repeat-badge {
            position: absolute;
            font-size: 8px;
            bottom: -2px;
            right: -2px;
            background: var(--accent);
            color: #000;
            padding: 0 3px;
            border-radius: 2px;
            font-weight: 800;
            display: none;
            box-shadow: 0 0 5px var(--accent);
        }

        .volume-wrapper {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid transparent;
            border-radius: 20px;
            height: 34px;
            width: 34px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .volume-wrapper:hover,
        .volume-wrapper.active,
        .volume-wrapper.is-dragging {
            width: 120px;
            border-color: var(--border-glass);
            background: rgba(0, 0, 0, 0.7);
        }

        .volume-icon-btn {
            min-width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
        }

        .volume-wrapper:hover .volume-icon-btn,
        .volume-wrapper.active .volume-icon-btn,
        .volume-wrapper.is-dragging .volume-icon-btn {
            color: var(--accent);
        }

        .volume-slider-container {
            width: 76px;
            opacity: 0;
            transition: opacity 0.2s;
            margin-left: 2px;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .volume-wrapper:hover .volume-slider-container,
        .volume-wrapper.active .volume-slider-container,
        .volume-wrapper.is-dragging .volume-slider-container {
            opacity: 1;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 24px;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--text-main);
            margin-top: -6px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover,
        input[type=range]:active::-webkit-slider-thumb {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transform: scale(1.2);
        }

        /* --- ICONS --- */
        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .btn-main svg {
            width: 22px;
            height: 22px;
            margin-left: 2px;
        }

        #pause-icon {
            margin-left: 0;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0% {
                opacity: 0.3;
                transform: scale(0.9);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
                box-shadow: 0 0 15px var(--accent);
            }

            100% {
                opacity: 0.3;
                transform: scale(0.9);
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .section-right {
                flex: 0.5;
            }

            .section-center {
                flex: 2;
                gap: 10px;
            }

            .time-display {
                display: none;
            }

            .track-title {
                max-width: 160px;
                font-size: 13px;
            }

            .status-block {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .track-title {
                max-width: 110px;
            }

            #nexus-player-bar {
                padding: 0 10px;
                padding-bottom: 5px;
            }

            .volume-wrapper {
                display: none;
            }

            .btn-nav svg {
                width: 18px;
                height: 18px;
            }
        }

        /* --- AD OVERLAY STYLES --- */
        #ad-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 10, 10, 0.95);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100000;
            border-bottom: 2px solid #ff4444;
            overflow: hidden;
            pointer-events: auto;
        }

        .ad-overlay-content {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .ad-overlay-text {
            color: #ff4444;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            animation: ad-glitch 1.5s infinite;
        }

        .ad-overlay-scanner {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 68, 68, 0.15), transparent);
            animation: ad-scan 2.5s linear infinite;
        }

        @keyframes ad-scan {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        @keyframes ad-glitch {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); text-shadow: 0 0 15px rgba(255, 68, 68, 0.8); }
            98% { transform: scale(1); }
            99% { transform: skew(-5deg) scale(0.98); }
        }
    </style>
</head>

<body>

    <!-- Full-screen video — behind the bar -->
    <iframe id="video-frame" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>

    <!-- NEXUS PLAYER BAR -->
    <div id="nexus-player-bar" onclick="handleBarClick(event)">
        <div id="dynamic-bg"></div>

        <!-- AD OVERLAY -->
        <div id="ad-overlay">
            <div class="ad-overlay-content">
                <span class="ad-overlay-scanner"></span>
                <span class="ad-overlay-text">AD DETECTED // STREAM SUSPENDED</span>
            </div>
        </div>

        <!-- LEFT: Telemetry -->
        <div class="section-left">
            <div class="status-block">
                <div class="status-dot" id="status-indicator"></div>
                <div class="status-label" id="status-label">SYS.OK</div>
            </div>
            <div class="track-info">
                <div class="track-title-wrapper" id="title-container">
                    <div class="track-title" id="track-name">ESTABLISHING LINK...</div>
                </div>
                <div class="credit" id="credit-label">VIDEO PLAYER</div>
            </div>
        </div>

        <!-- CENTER: Controls + Time -->
        <div class="section-center">
            <div class="time-display" id="current-time">00:00</div>

            <button class="btn btn-nav" onclick="triggerPrev()" title="Restart">
                <svg viewBox="0 0 24 24">
                    <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                </svg>
            </button>

            <button class="btn btn-main" id="play-pause-btn" onclick="togglePlay()">
                <svg id="play-icon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
            </button>

            <button class="btn btn-nav" onclick="triggerNext()" title="Skip">
                <svg viewBox="0 0 24 24">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                </svg>
            </button>

            <div class="time-display" id="duration">00:00</div>
        </div>

        <!-- RIGHT: Aux Systems -->
        <div class="section-right">
            <button class="btn" id="repeat-btn" onclick="toggleRepeat()" title="Cycle Loop Mode"
                style="position:relative;">
                <svg viewBox="0 0 24 24">
                    <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
                </svg>
                <div class="repeat-badge" id="repeat-badge">1</div>
            </button>

            <!-- Volume Assembly -->
            <div class="volume-wrapper" id="volume-wrapper" onclick="toggleVolumeTouch(event)">
                <button class="volume-icon-btn" id="volume-mute-btn" onclick="toggleMute()">
                    <svg id="vol-icon-high" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                    <svg id="vol-icon-muted" viewBox="0 0 24 24" style="display:none;">
                        <path
                            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z" />
                    </svg>
                </button>
                <div class="volume-slider-container">
                    <input type="range" id="volume-slider" min="0" max="100" value="100"
                        oninput="updateVolume(this.value)">
                </div>
            </div>

            <button class="btn" onclick="openYouTube()" title="Open on YouTube">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z" />
                </svg>
            </button>
        </div>

        <!-- FULL WIDTH BOTTOM SCRUBBER -->
        <div class="progress-container" id="progress-container">
            <div class="progress-track">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // ── URL params ────────────────────────────────────────────────────────
        // ?v=VIDEO_ID   video to play
        // ?c=COLOR      accent colour (hex, # optional)
        // ?ap=0         disable autoplay (default: on)
        // ?theme=THEME  switch themes (e.g. cyberpunk, celestial)
        const urlParams = new URLSearchParams(window.location.search);

        // Load Theme
        const theme = urlParams.get('theme') || urlParams.get('t') || 'nasapunk';
        if (theme && theme !== 'nasapunk') {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.id = 'theme-stylesheet';
            link.href = `themes/${theme}.css`;
            document.head.appendChild(link);
            document.documentElement.classList.add(`theme-${theme}`);
        } else {
            document.documentElement.classList.add('theme-nasapunk');
        }

        // Accent colour
        if (urlParams.has('c')) {
            let color = urlParams.get('c');
            if (!color.startsWith('#')) color = '#' + color;
            document.documentElement.style.setProperty('--accent', color);
        }

        // ── State ─────────────────────────────────────────────────────────────
        let player;
        const videoId = urlParams.get('v') || 'dQw4w9WgXcQ';
        const autoplay = urlParams.get('ap') !== '0' ? 1 : 0;
        let repeatState = 0;
        let animationFrameId;
        let isDraggingProgress = false;
        let preMuteVolume = 100;
        let lastSyncedVolume = -1;
        let lastSyncedMute = null;
        let volumeSetTime = 0;
        let initialMetadataSet = false;
        let isAdActive = false;

        // ── Ad Detection Infrastructure ────────────────────────────────────────
        // Intercept cross-origin postMessages from YouTube player
        window.addEventListener('message', function(event) {
            try {
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (data && data.event === 'infoDelivery' && data.info) {
                    if (data.info.adState !== undefined) {
                        setAdState(data.info.adState > 0);
                    } else if (data.info.adShowing !== undefined) {
                        setAdState(!!data.info.adShowing);
                    } else if (data.info.isAd !== undefined) {
                        setAdState(!!data.info.isAd);
                    }
                }
            } catch (e) {
                // Ignore parsing errors
            }
        });

        function checkAdStatus() {
            if (!player || typeof player.getVideoData !== 'function') return;
            
            const data = player.getVideoData();
            let isAd = false;
            
            if (data && data.video_id) {
                if (data.video_id !== videoId) {
                    if (typeof player.getPlaylist === 'function') {
                        const playlist = player.getPlaylist();
                        if (!playlist || !playlist.includes(data.video_id)) {
                            isAd = true;
                        }
                    } else {
                        isAd = true;
                    }
                }
            }
            
            setAdState(isAd);
        }

        function setAdState(isAd) {
            const overlay = document.getElementById('ad-overlay');
            if (isAd) {
                if (!isAdActive) {
                    isAdActive = true;
                    overlay.style.display = 'flex';
                    setStatus('AD.PLAY', '#ff4444', '0.5s');
                    syncMuteWithUI();
                }
            } else {
                if (isAdActive) {
                    isAdActive = false;
                    overlay.style.display = 'none';
                    resetStatusAfterAd();
                    syncMuteWithUI();
                }
            }
        }

        function resetStatusAfterAd() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                setStatus('ACTIVE', 'var(--accent)', '1s');
            } else if (state === YT.PlayerState.BUFFERING) {
                setStatus('BUFFERING', 'var(--accent)', '0.5s');
            } else {
                setStatus('STANDBY', 'var(--accent)', '4s');
            }
        }

        function safeGetStorage(k) { try { return localStorage.getItem(k); } catch { return null; } }
        function safeSetStorage(k, v) { try { localStorage.setItem(k, v); } catch { } }

        // ── YT IFrame API bootstrap ───────────────────────────────────────────
        function initializePlayback() {
            if (window.YT && window.YT.Player) {
                createYTPlayerInstance();
            } else {
                if (!document.getElementById('yt-iframe-api-script')) {
                    const s = document.createElement('script');
                    s.id = 'yt-iframe-api-script';
                    s.src = 'https://www.youtube.com/iframe_api';
                    document.head.appendChild(s);
                }
            }
        }

        function createYTPlayerInstance() {
            const iframe = document.getElementById('video-frame');
            iframe.removeAttribute('src');

            const params = [
                'enablejsapi=1',
                'controls=1',
                'playsinline=1',
                'modestbranding=1',
                'rel=0',
                'iv_load_policy=3',
                `autoplay=${autoplay}`,
            ].join('&');

            iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?${params}`;

            player = new YT.Player('video-frame', {
                events: {
                    onReady: onSystemReady,
                    onStateChange: onSystemStateChange,
                    onError: onSystemError,
                }
            });
        }

        window.onYouTubeIframeAPIReady = function () {
            createYTPlayerInstance();
        };

        // ── Player events ─────────────────────────────────────────────────────
        function onSystemReady() {
            // Restore volume + mute from localStorage (params override if present)
            const savedVol = safeGetStorage('nexus-volume');
            const savedMute = safeGetStorage('nexus-muted');
            const hasMuteParam = urlParams.get('mute') === '1' || urlParams.get('mute') === 'true';

            let vol = 100;
            if (urlParams.has('vol')) {
                const pVol = parseInt(urlParams.get('vol'));
                if (!isNaN(pVol)) vol = pVol;
            }
            if (savedVol !== null) {
                const sVol = parseInt(savedVol);
                if (!isNaN(sVol)) vol = sVol;
            }

            // Initialize preMuteVolume to the loaded vol so unmuting goes back to this default
            preMuteVolume = vol;

            // Mute: url param overrides storage
            const isMuted = hasMuteParam || savedMute === '1';

            player.setVolume(vol);
            player.mute(); // Mute initially because play icon is showing by default

            const slider = document.getElementById('volume-slider');
            slider.value = isMuted ? 0 : vol;
            toggleMuteIcon(isMuted || vol === 0);
            lastSyncedVolume = isMuted ? 0 : vol;
            lastSyncedMute = isMuted;
            volumeSetTime = Date.now();

            setStatus('SYS.OK', 'var(--accent)', '4s');
            updateTelemetry();

            // Register ad state listener if supported by the player runtime
            try {
                player.addEventListener('onAdStateChange', function(state) {
                    setAdState(state === 1 || state === true);
                });
            } catch (e) {
                // Ignore errors if unsupported
            }

            // Fallback periodic check for ad state changes
            setInterval(checkAdStatus, 200);

            // Block overlay click propagation to prevent triggering control actions
            const adOverlay = document.getElementById('ad-overlay');
            if (adOverlay) {
                adOverlay.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }
        }

        function onSystemStateChange(event) {
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');

            // Instantly check ad status when state changes
            checkAdStatus();

            if (event.data === YT.PlayerState.PLAYING) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                syncMuteWithUI();
                if (!isAdActive) {
                    setStatus('ACTIVE', 'var(--accent)', '1s');
                }
                updateTelemetry();
                setTimeout(applyMarqueeLogic, 500);
                startCinematicLoop();
            } else if (event.data === YT.PlayerState.BUFFERING) {
                if (!isAdActive) {
                    setStatus('BUFFERING', 'var(--accent)', '0.5s');
                }
                syncVolumeUI();
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                syncMuteWithUI();
                if (!isAdActive) {
                    setStatus('STANDBY', 'var(--accent)', '4s');
                }
                stopCinematicLoop();
                syncVolumeUI();
            }

            if (event.data === YT.PlayerState.ENDED) {
                if (repeatState === 2) {
                    player.seekTo(0); player.playVideo();
                } else if (repeatState === 1) {
                    const pl = player.getPlaylist();
                    if (!pl || pl.length === 0) { player.seekTo(0); player.playVideo(); }
                } else {
                    document.getElementById('progress-bar').style.width = '100%';
                }
            }
        }

        function onSystemError() {
            setStatus('ERR', '#ff3333', '0.5s');
        }

        // ── Controls ──────────────────────────────────────────────────────────
        function togglePlay() {
            if (!player || !player.getPlayerState) return;
            player.getPlayerState() === YT.PlayerState.PLAYING
                ? player.pauseVideo() : player.playVideo();
        }

        function triggerPrev() {
            if (!player) return;
            const pl = player.getPlaylist();
            pl && pl.length > 0 ? player.previousVideo() : player.seekTo(0);
            flashVisualFeedback();
        }

        function triggerNext() {
            if (!player) return;
            const pl = player.getPlaylist();
            pl && pl.length > 0 ? player.nextVideo() : player.seekTo(player.getDuration() - 1);
            flashVisualFeedback();
        }

        function handleBarClick(e) {
            if (!player || !player.getPlayerState) return;
            if (!e.target.closest('button, .progress-container, input')) {
                if (player.getPlayerState() !== YT.PlayerState.PLAYING) player.playVideo();
            }
        }

        // ── Volume ────────────────────────────────────────────────────────────
        function updateVolume(val) {
            if (!player) return;
            val = parseInt(val);
            safeSetStorage('nexus-volume', val);
            
            const playIcon = document.getElementById('play-icon');
            const isPaused = playIcon.style.display !== 'none';
            
            if (val === 0) {
                toggleMuteIcon(true);
                safeSetStorage('nexus-muted', '1');
                player.mute();
            } else {
                toggleMuteIcon(false);
                safeSetStorage('nexus-muted', '0');
                if (!isPaused && !isAdActive) {
                    player.unMute();
                    player.setVolume(val);
                } else {
                    player.setVolume(val);
                }
            }
            lastSyncedVolume = val;
            lastSyncedMute = (val === 0);
            volumeSetTime = Date.now();
        }

        function syncVolumeUI() {
            if (Date.now() - volumeSetTime < 1000) return;
            if (!player || !player.getVolume || !player.isMuted) return;
            
            // Skip sync if muted due to pause or active ad
            const playIcon = document.getElementById('play-icon');
            const isPaused = playIcon.style.display !== 'none';
            if (isAdActive || isPaused) return;

            const vol = player.getVolume();
            const muted = player.isMuted();
            if (vol !== lastSyncedVolume || muted !== lastSyncedMute) {
                lastSyncedVolume = vol;
                lastSyncedMute = muted;
                document.getElementById('volume-slider').value = muted ? 0 : vol;
                toggleMuteIcon(muted || vol === 0);
                // Persist — catches changes made via the player's own controls
                safeSetStorage('nexus-volume', vol);
                safeSetStorage('nexus-muted', muted ? '1' : '0');
            }
        }

        function syncMuteWithUI() {
            if (!player) return;
            const playIcon = document.getElementById('play-icon');
            const isPaused = playIcon.style.display !== 'none';
            
            if (isAdActive) {
                if (typeof player.mute === 'function') {
                    player.mute();
                }
            } else {
                if (isPaused) {
                    if (typeof player.mute === 'function') {
                        player.mute();
                    }
                } else {
                    const savedMute = safeGetStorage('nexus-muted');
                    const slider = document.getElementById('volume-slider');
                    const isUserMuted = (savedMute === '1' || slider.value == 0);
                    if (isUserMuted) {
                        if (typeof player.mute === 'function') {
                            player.mute();
                        }
                    } else {
                        if (typeof player.unMute === 'function') {
                            player.unMute();
                        }
                    }
                }
            }
        }

        function toggleMute() {
            if (!player) return;
            const slider = document.getElementById('volume-slider');
            const playIcon = document.getElementById('play-icon');
            const isPaused = playIcon.style.display !== 'none';
            const userMuted = safeGetStorage('nexus-muted') === '1' || slider.value == 0;

            if (userMuted) {
                const v = preMuteVolume || 100;
                slider.value = v;
                safeSetStorage('nexus-volume', v);
                safeSetStorage('nexus-muted', '0');
                lastSyncedVolume = v;
                lastSyncedMute = false;
                toggleMuteIcon(false);
                
                if (!isPaused && !isAdActive) {
                    player.unMute();
                    player.setVolume(v);
                }
            } else {
                preMuteVolume = parseInt(slider.value) || 100;
                slider.value = 0;
                safeSetStorage('nexus-muted', '1');
                lastSyncedVolume = 0;
                lastSyncedMute = true;
                toggleMuteIcon(true);
                player.mute();
            }
            volumeSetTime = Date.now();
        }

        function toggleMuteIcon(isMuted) {
            document.getElementById('vol-icon-high').style.display = isMuted ? 'none' : 'block';
            document.getElementById('vol-icon-muted').style.display = isMuted ? 'block' : 'none';
        }

        function toggleVolumeTouch(e) {
            if (e.target.tagName === 'INPUT' || e.target.closest('#volume-mute-btn')) return;
            const w = document.getElementById('volume-wrapper');
            w.classList.add('active');
            setTimeout(() => { if (!w.classList.contains('is-dragging')) w.classList.remove('active'); }, 3000);
        }

        const volSlider = document.getElementById('volume-slider');
        const volWrapper = document.getElementById('volume-wrapper');
        function setVolDragging(on) {
            on ? volWrapper.classList.add('is-dragging')
                : (volWrapper.classList.remove('is-dragging'), volWrapper.classList.remove('active'));
        }
        volSlider.addEventListener('mousedown', () => setVolDragging(true));
        volSlider.addEventListener('touchstart', () => setVolDragging(true), { passive: true });
        document.addEventListener('mouseup', () => { if (volWrapper.classList.contains('is-dragging')) setVolDragging(false); });
        document.addEventListener('touchend', () => { if (volWrapper.classList.contains('is-dragging')) setVolDragging(false); });

        // ── Repeat ────────────────────────────────────────────────────────────
        function toggleRepeat() { repeatState = (repeatState + 1) % 3; updateRepeatUI(); }
        function updateRepeatUI() {
            const btn = document.getElementById('repeat-btn');
            const badge = document.getElementById('repeat-badge');
            btn.classList.remove('btn-state-active'); badge.style.display = 'none';
            if (repeatState === 1) btn.classList.add('btn-state-active');
            else if (repeatState === 2) { btn.classList.add('btn-state-active'); badge.style.display = 'block'; badge.innerText = '1'; }
        }

        function openYouTube() {
            const id = (player && player.getVideoData && player.getVideoData().video_id) || videoId;
            window.open(`https://www.yout-ube.com/watch?v=${id}`, '_blank');
        }

        // ── Cinematic loop (progress + volume sync) ───────────────────────────
        function startCinematicLoop() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            function update() {
                if (!isDraggingProgress && player && player.getDuration && player.getCurrentTime) {
                    const curr = player.getCurrentTime(), dur = player.getDuration();
                    if (dur > 0) {
                        document.getElementById('progress-bar').style.width = (curr / dur) * 100 + '%';
                        document.getElementById('current-time').innerText = formatTime(curr);
                        document.getElementById('duration').innerText = formatTime(dur);
                    }
                }
                if (!volWrapper.classList.contains('is-dragging')) syncVolumeUI();

                // Track ad status changes during playback
                checkAdStatus();

                animationFrameId = requestAnimationFrame(update);
            }
            animationFrameId = requestAnimationFrame(update);
        }

        function stopCinematicLoop() { if (animationFrameId) cancelAnimationFrame(animationFrameId); }

        // ── Telemetry ─────────────────────────────────────────────────────────
        function updateTelemetry() {
            if (isAdActive) return;
            if (!player || !player.getVideoData) return;
            const data = player.getVideoData();
            if (data && data.title) {
                if (!initialMetadataSet) {
                    document.getElementById('track-name').innerText = data.title.toUpperCase();
                    document.getElementById('credit-label').innerText = (data.author || '').toUpperCase();
                    document.title = data.title + ' — VP';
                    initialMetadataSet = true;
                }
                const id = data.video_id || videoId;
                if (id) {
                    document.getElementById('dynamic-bg').style.backgroundImage =
                        `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
                }
            }
        }

        function applyMarqueeLogic() {
            const trackEl = document.getElementById('track-name');
            const container = document.getElementById('title-container');
            trackEl.classList.remove('marquee');
            trackEl.style.width = 'auto';
            trackEl.style.transform = '';
            if (trackEl.scrollWidth > container.clientWidth) {
                const text = trackEl.innerText;
                trackEl.innerHTML = `<span>${text}</span><span style="padding-left:100px">${text}</span>`;
                trackEl.classList.add('marquee');
                trackEl.style.setProperty('--duration', (trackEl.scrollWidth / 40) + 's');
            }
        }

        function setStatus(text, color, pulseSpeed) {
            const ind = document.getElementById('status-indicator');
            const lbl = document.getElementById('status-label');
            ind.style.background = color;
            ind.style.boxShadow = `0 0 10px ${color}`;
            ind.style.animationDuration = pulseSpeed;
            lbl.innerText = text;
            lbl.style.color = color;
        }

        // ── Progress scrubbing ────────────────────────────────────────────────
        const progressContainer = document.getElementById('progress-container');
        function handleScrub(e) {
            if (!player) return;
            const rect = progressContainer.getBoundingClientRect();
            const x = Math.max(0, Math.min((e.touches ? e.touches[0].clientX : e.clientX) - rect.left, rect.width));
            const perc = x / rect.width;
            document.getElementById('progress-bar').style.width = (perc * 100) + '%';
            if (e.type === 'mouseup' || e.type === 'touchend') {
                player.seekTo(player.getDuration() * perc, true);
                isDraggingProgress = false;
                startCinematicLoop();
            }
        }

        progressContainer.addEventListener('mousedown', e => { isDraggingProgress = true; stopCinematicLoop(); handleScrub(e); });
        progressContainer.addEventListener('touchstart', e => { isDraggingProgress = true; stopCinematicLoop(); handleScrub(e); }, { passive: false });
        document.addEventListener('mousemove', e => { if (isDraggingProgress) handleScrub(e); });
        document.addEventListener('touchmove', e => { if (isDraggingProgress) handleScrub(e); }, { passive: false });
        document.addEventListener('mouseup', e => { if (isDraggingProgress) handleScrub(e); });
        document.addEventListener('touchend', e => { if (isDraggingProgress) handleScrub(e); });

        function formatTime(s) {
            return `${Math.floor(s / 60).toString().padStart(2, '0')}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        function flashVisualFeedback() {
            const bar = document.getElementById('nexus-player-bar');
            bar.style.borderColor = 'var(--accent)';
            setTimeout(() => bar.style.borderColor = '', 300);
        }

        // ── Boot ──────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', initializePlayback);
    </script>
</body>
