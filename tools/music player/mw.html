<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --accent: #00ffcc;
            --bg-glass: rgba(10, 12, 16, 0.75);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --bar-height: 75px;
            --grid-size: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: transparent;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Native audio engine — hidden */
        #audio-engine {
            display: none;
        }

        /* NASAPUNK WIDGET BASE */
        #nexus-player-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: var(--bar-height);
            background: var(--bg-glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            padding: 0 20px;
            padding-bottom: 6px;
            color: var(--text-main);
            z-index: 99999;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s ease;
        }

        /* Tactical Grid */
        #nexus-player-bar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none;
            z-index: -1;
        }

        #dynamic-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            filter: blur(15px) saturate(140%);
            z-index: -2;
            transition: background-image 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- LAYOUT SECTIONS --- */
        .section-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            min-width: 0;
        }

        .section-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex: 1.5;
            z-index: 10;
        }

        .section-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            flex: 1;
            z-index: 10;
        }

        /* --- LEFT: TELEMETRY --- */
        .status-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-glass);
            padding-right: 15px;
            height: 40px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 4s infinite;
        }

        .status-label {
            font-size: 8px;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 1px;
            font-weight: 700;
            transition: color 0.3s;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
        }

        .track-title-wrapper {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .track-title {
            font-size: 14px;
            font-weight: 800;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-main);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
            transition: transform 0.1s linear;
            padding-right: 50px;
        }

        .track-title.marquee {
            animation: marquee-scroll var(--duration, 10s) linear infinite;
        }

        @keyframes marquee-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .credit {
            font-size: 9px;
            color: var(--accent);
            letter-spacing: 1px;
            margin-top: 2px;
            font-weight: 700;
            opacity: 0.7;
        }

        /* --- CENTER: CONTROLS & TIMING --- */
        .time-display {
            font-size: 11px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            width: 45px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
            padding: 5px;
        }

        .btn:hover {
            opacity: 1;
            color: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent));
            transform: scale(1.1);
        }

        .btn:active { transform: scale(0.9); }

        .btn-main {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 1px solid var(--border-glass);
            opacity: 1;
            backdrop-filter: blur(5px);
        }

        .btn-main:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* --- ABSOLUTE FULL-WIDTH PROGRESS BAR --- */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 20;
            transition: height 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-container:hover,
        .progress-container:active { height: 12px; }

        .progress-track {
            width: 100%;
            height: 100%;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: var(--accent);
            width: 0%;
            box-shadow: 0 0 15px var(--accent);
            pointer-events: none;
            will-change: width;
            transition: background-color 0.3s;
        }

        .progress-container:hover .progress-bar {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }

        /* --- RIGHT: MODULES & VOLUME --- */
        .btn-state-active {
            color: var(--accent);
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .repeat-badge {
            position: absolute;
            font-size: 8px;
            bottom: -2px;
            right: -2px;
            background: var(--accent);
            color: #000;
            padding: 0 3px;
            border-radius: 2px;
            font-weight: 800;
            display: none;
            box-shadow: 0 0 5px var(--accent);
        }

        .volume-wrapper {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid transparent;
            border-radius: 20px;
            height: 34px;
            width: 34px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .volume-wrapper:hover,
        .volume-wrapper.active,
        .volume-wrapper.is-dragging {
            width: 120px;
            border-color: var(--border-glass);
            background: rgba(0, 0, 0, 0.7);
        }

        .volume-icon-btn {
            min-width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
        }

        .volume-wrapper:hover .volume-icon-btn,
        .volume-wrapper.active .volume-icon-btn,
        .volume-wrapper.is-dragging .volume-icon-btn { color: var(--accent); }

        .volume-slider-container {
            width: 76px;
            opacity: 0;
            transition: opacity 0.2s;
            margin-left: 2px;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .volume-wrapper:hover .volume-slider-container,
        .volume-wrapper.active .volume-slider-container,
        .volume-wrapper.is-dragging .volume-slider-container { opacity: 1; }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 24px;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--text-main);
            margin-top: -6px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover,
        input[type=range]:active::-webkit-slider-thumb {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transform: scale(1.2);
        }

        /* --- ICONS --- */
        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .btn-main svg {
            width: 22px;
            height: 22px;
            margin-left: 2px;
        }

        #pause-icon { margin-left: 0; }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0%   { opacity: 0.3; transform: scale(0.9); }
            50%  { opacity: 1;   transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .section-right  { flex: 0.5; }
            .section-center { flex: 2; gap: 10px; }
            .time-display   { display: none; }
            .track-title    { max-width: 160px; font-size: 13px; }
            .status-block   { display: none; }
        }

        @media (max-width: 480px) {
            .track-title    { max-width: 110px; }
            #nexus-player-bar { padding: 0 10px; padding-bottom: 5px; }
            .volume-wrapper { display: none; }
            .btn-nav svg    { width: 18px; height: 18px; }
        }
    </style>
</head>

<body>

    <!-- Native audio engine — sovereign, ad-free -->
    <audio id="audio-engine" preload="metadata"></audio>

    <!-- NEXUS PLAYER BAR -->
    <div id="nexus-player-bar" onclick="handleBarClick(event)">
        <div id="dynamic-bg"></div>

        <!-- LEFT: Telemetry -->
        <div class="section-left">
            <div class="status-block">
                <div class="status-dot" id="status-indicator"></div>
                <div class="status-label" id="status-label">SYS.OK</div>
            </div>
            <div class="track-info">
                <div class="track-title-wrapper" id="title-container">
                    <div class="track-title" id="track-name">ESTABLISHING LINK...</div>
                </div>
                <div class="credit" id="credit-label">AUDIO PLAYER</div>
            </div>
        </div>

        <!-- CENTER: Controls + Time -->
        <div class="section-center">
            <div class="time-display" id="current-time">00:00</div>

            <button class="btn btn-nav" onclick="triggerPrev()" title="Restart / Prev">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>

            <button class="btn btn-main" id="play-pause-btn" onclick="togglePlay()">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>

            <button class="btn btn-nav" onclick="triggerNext()" title="End / Next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>

            <div class="time-display" id="duration">00:00</div>
        </div>

        <!-- RIGHT: Aux Systems -->
        <div class="section-right">
            <button class="btn" id="repeat-btn" onclick="toggleRepeat()" title="Cycle Loop Mode" style="position:relative;">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                <div class="repeat-badge" id="repeat-badge">1</div>
            </button>

            <!-- Volume Assembly -->
            <div class="volume-wrapper" id="volume-wrapper" onclick="toggleVolumeTouch(event)">
                <button class="volume-icon-btn" id="volume-mute-btn" onclick="toggleMute()">
                    <svg id="vol-icon-high" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg id="vol-icon-muted" viewBox="0 0 24 24" style="display:none;">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>
                    </svg>
                </button>
                <div class="volume-slider-container">
                    <input type="range" id="volume-slider" min="0" max="100" value="100"
                           oninput="updateVolume(this.value)">
                </div>
            </div>

            <button class="btn" onclick="openSource()" title="Open on YouTube">
                <svg viewBox="0 0 24 24">
                    <path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
                </svg>
            </button>
        </div>

        <!-- FULL WIDTH BOTTOM SCRUBBER -->
        <div class="progress-container" id="progress-container">
            <div class="progress-track">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // ── URL params ────────────────────────────────────────────────────────
        // ?v=VIDEO_ID   YouTube video ID (requires backend server.py)
        // ?src=URL      Direct audio stream URL (no backend needed)
        // ?title=TEXT   Track title override
        // ?artist=TEXT  Artist / channel override
        // ?thumb=URL    Thumbnail URL override
        // ?c=COLOR      Accent colour (hex, # optional)
        // ?ap=0         Disable autoplay (default: on)
        const urlParams  = new URLSearchParams(window.location.search);

        // Accent colour
        if (urlParams.has('c')) {
            let color = urlParams.get('c');
            if (!color.startsWith('#')) color = '#' + color;
            document.documentElement.style.setProperty('--accent', color);
        }

        // ── Config ────────────────────────────────────────────────────────────
        const BACKEND_URL = 'http://127.0.0.1:7171';
        const videoId     = urlParams.get('v') || 'BYTxPFj44uo';
        const directSrc   = urlParams.get('src') || '';
        const autoplay    = urlParams.get('ap') !== '0';
        const paramTitle  = urlParams.get('title') || '';
        const paramArtist = urlParams.get('artist') || '';
        const paramThumb  = urlParams.get('thumb') || '';

        // ── State ─────────────────────────────────────────────────────────────
        let repeatState        = 0;   // 0=off 1=all(single) 2=one
        let isDraggingProgress = false;
        let animationFrameId;
        let preMuteVolume      = 100;
        let currentVideoId     = videoId;  // may be updated from extraction

        function safeGetStorage(k) { try { return localStorage.getItem(k); } catch { return null; } }
        function safeSetStorage(k, v) { try { localStorage.setItem(k, v); } catch {} }

        // ── Native audio engine ───────────────────────────────────────────────
        const audio = document.getElementById('audio-engine');

        audio.addEventListener('play',    onPlay);
        audio.addEventListener('pause',   onPause);
        audio.addEventListener('ended',   onEnded);
        audio.addEventListener('waiting', onBuffering);
        audio.addEventListener('canplay', onCanPlay);
        audio.addEventListener('error',   onError);
        audio.addEventListener('loadedmetadata', onMetadataLoaded);
        audio.addEventListener('timeupdate', onTimeUpdate);

        // ── Boot sequence ─────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', initializePlayback);

        async function initializePlayback() {
            restoreVolumeState();
            setStatus('LINK...', 'var(--accent)', '0.5s');

            if (directSrc) {
                // Option A: caller passes direct stream URL
                loadStream(directSrc, {
                    title:    paramTitle || 'AUDIO STREAM',
                    artist:   paramArtist || '',
                    thumb:    paramThumb || '',
                    video_id: videoId,
                });
            } else if (videoId) {
                // Option B: resolve via backend
                await resolveAndLoad(videoId);
            } else {
                setStatus('NO SRC', '#ff3333', '4s');
                document.getElementById('track-name').innerText = 'NO SOURCE — USE ?v= OR ?src=';
            }
        }

        // ── Backend extraction ────────────────────────────────────────────────
        async function resolveAndLoad(vid) {
            setStatus('FETCHING', 'var(--accent)', '0.5s');
            try {
                const res = await fetch(`${BACKEND_URL}/extract?v=${encodeURIComponent(vid)}`);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
                    throw new Error(err.error || `HTTP ${res.status}`);
                }
                const data = await res.json();
                loadStream(data.url, data);
            } catch (err) {
                console.error('[nexus] extraction failed:', err);
                setStatus('ERR', '#ff3333', '0.5s');
                document.getElementById('track-name').innerText = `EXTRACTION ERROR: ${err.message}`;
                document.getElementById('track-name').title = err.message;
            }
        }

        // ── Stream loader ─────────────────────────────────────────────────────
        function loadStream(url, meta = {}) {
            audio.src = url;
            audio.load();

            // Apply metadata immediately (don't wait for audio events)
            applyMetadata(meta);

            if (autoplay) {
                audio.play().catch(err => {
                    // Autoplay blocked — show play button, wait for user gesture
                    console.warn('[nexus] autoplay blocked:', err.message);
                    setStatus('PAUSED', 'var(--accent)', '4s');
                });
            }
        }

        function applyMetadata(meta) {
            const title  = paramTitle  || meta.title  || 'AUDIO STREAM';
            const artist = paramArtist || meta.artist || '';
            const thumb  = paramThumb  || meta.thumb  || '';
            const vid    = meta.video_id || videoId;

            document.getElementById('track-name').innerText  = title.toUpperCase();
            document.getElementById('credit-label').innerText = artist.toUpperCase();
            document.title = title ? title + ' — VP' : 'Video Player';

            if (thumb) {
                document.getElementById('dynamic-bg').style.backgroundImage = `url('${thumb}')`;
            } else if (vid) {
                document.getElementById('dynamic-bg').style.backgroundImage =
                    `url('https://img.youtube.com/vi/${vid}/hqdefault.jpg')`;
            }

            currentVideoId = vid;
            setTimeout(applyMarqueeLogic, 100);
        }

        // ── Audio event handlers ──────────────────────────────────────────────
        function onPlay() {
            document.getElementById('play-icon').style.display  = 'none';
            document.getElementById('pause-icon').style.display = 'block';
            setStatus('ACTIVE', 'var(--accent)', '1s');
            startCinematicLoop();
            setTimeout(applyMarqueeLogic, 500);
        }

        function onPause() {
            document.getElementById('play-icon').style.display  = 'block';
            document.getElementById('pause-icon').style.display = 'none';
            setStatus('STANDBY', 'var(--accent)', '4s');
            stopCinematicLoop();
        }

        function onEnded() {
            stopCinematicLoop();
            document.getElementById('play-icon').style.display  = 'block';
            document.getElementById('pause-icon').style.display = 'none';

            if (repeatState === 2) {
                // Repeat one
                audio.currentTime = 0;
                audio.play();
            } else if (repeatState === 1) {
                // Repeat all (single track = restart)
                audio.currentTime = 0;
                audio.play();
            } else {
                document.getElementById('progress-bar').style.width = '100%';
                setStatus('ENDED', 'var(--accent)', '4s');
            }
        }

        function onBuffering() {
            setStatus('BUFFERING', 'var(--accent)', '0.5s');
        }

        function onCanPlay() {
            if (!audio.paused) setStatus('ACTIVE', 'var(--accent)', '1s');
        }

        function onError() {
            const code = audio.error ? audio.error.code : '?';
            const msgs = { 1: 'ABORTED', 2: 'NETWORK', 3: 'DECODE', 4: 'SRC_NOT_SUPPORTED' };
            setStatus(msgs[code] || 'ERR', '#ff3333', '0.5s');
            console.error('[nexus] audio error code', code);
        }

        function onMetadataLoaded() {
            const dur = audio.duration;
            if (dur && isFinite(dur)) {
                document.getElementById('duration').innerText = formatTime(dur);
            }
        }

        function onTimeUpdate() {
            if (isDraggingProgress) return;
            const curr = audio.currentTime;
            const dur  = audio.duration;
            if (dur && isFinite(dur) && dur > 0) {
                document.getElementById('progress-bar').style.width = (curr / dur) * 100 + '%';
                document.getElementById('current-time').innerText   = formatTime(curr);
                document.getElementById('duration').innerText        = formatTime(dur);
            }
        }

        // ── Controls ──────────────────────────────────────────────────────────
        function togglePlay() {
            audio.paused ? audio.play() : audio.pause();
        }

        function triggerPrev() {
            // Restart track (or go prev if we extend to playlist later)
            audio.currentTime = 0;
            if (audio.paused) audio.play();
            flashVisualFeedback();
        }

        function triggerNext() {
            // Jump to end (triggers onEnded logic — repeat, etc.)
            if (audio.duration && isFinite(audio.duration)) {
                audio.currentTime = audio.duration - 0.1;
            }
            flashVisualFeedback();
        }

        function handleBarClick(e) {
            if (!e.target.closest('button, .progress-container, input')) {
                if (audio.paused) audio.play();
            }
        }

        // ── Volume ────────────────────────────────────────────────────────────
        function restoreVolumeState() {
            const savedVol  = safeGetStorage('nexus-volume');
            const savedMute = safeGetStorage('nexus-muted');
            const hasMuteParam = urlParams.get('mute') === '1' || urlParams.get('mute') === 'true';

            let vol = savedVol !== null ? parseInt(savedVol) : 100;
            if (urlParams.has('vol')) vol = parseInt(urlParams.get('vol'));
            const isMuted = hasMuteParam || savedMute === '1';

            audio.volume = Math.min(100, Math.max(0, vol)) / 100;
            audio.muted  = isMuted;

            const slider = document.getElementById('volume-slider');
            slider.value = isMuted ? 0 : vol;
            toggleMuteIcon(isMuted || vol === 0);
            preMuteVolume = vol;
        }

        function updateVolume(val) {
            val = parseInt(val);
            audio.volume = val / 100;
            if (val === 0) {
                audio.muted = true;
                toggleMuteIcon(true);
                safeSetStorage('nexus-muted', '1');
            } else {
                audio.muted = false;
                toggleMuteIcon(false);
                safeSetStorage('nexus-muted', '0');
            }
            safeSetStorage('nexus-volume', val);
        }

        function toggleMute() {
            const slider = document.getElementById('volume-slider');
            if (audio.muted || slider.value == 0) {
                audio.muted  = false;
                const v = preMuteVolume || 100;
                audio.volume = v / 100;
                slider.value = v;
                toggleMuteIcon(false);
                safeSetStorage('nexus-volume', v);
                safeSetStorage('nexus-muted', '0');
            } else {
                preMuteVolume = parseInt(slider.value);
                audio.muted  = true;
                slider.value = 0;
                toggleMuteIcon(true);
                safeSetStorage('nexus-muted', '1');
            }
        }

        function toggleMuteIcon(isMuted) {
            document.getElementById('vol-icon-high').style.display  = isMuted ? 'none'  : 'block';
            document.getElementById('vol-icon-muted').style.display = isMuted ? 'block' : 'none';
        }

        function toggleVolumeTouch(e) {
            if (e.target.tagName === 'INPUT' || e.target.closest('#volume-mute-btn')) return;
            const w = document.getElementById('volume-wrapper');
            w.classList.add('active');
            setTimeout(() => { if (!w.classList.contains('is-dragging')) w.classList.remove('active'); }, 3000);
        }

        const volSlider  = document.getElementById('volume-slider');
        const volWrapper = document.getElementById('volume-wrapper');
        function setVolDragging(on) {
            on ? volWrapper.classList.add('is-dragging')
               : (volWrapper.classList.remove('is-dragging'), volWrapper.classList.remove('active'));
        }
        volSlider.addEventListener('mousedown',  () => setVolDragging(true));
        volSlider.addEventListener('touchstart', () => setVolDragging(true), { passive: true });
        document.addEventListener('mouseup',  () => { if (volWrapper.classList.contains('is-dragging')) setVolDragging(false); });
        document.addEventListener('touchend', () => { if (volWrapper.classList.contains('is-dragging')) setVolDragging(false); });

        // ── Repeat ────────────────────────────────────────────────────────────
        function toggleRepeat() { repeatState = (repeatState + 1) % 3; updateRepeatUI(); }
        function updateRepeatUI() {
            const btn   = document.getElementById('repeat-btn');
            const badge = document.getElementById('repeat-badge');
            btn.classList.remove('btn-state-active');
            badge.style.display = 'none';
            if (repeatState === 1) btn.classList.add('btn-state-active');
            else if (repeatState === 2) {
                btn.classList.add('btn-state-active');
                badge.style.display = 'block';
                badge.innerText = '1';
            }
        }

        // ── External link ─────────────────────────────────────────────────────
        function openSource() {
            if (currentVideoId) {
                window.open(`https://www.yout-ube.com/watch?v=${currentVideoId}`, '_blank');
            } else if (audio.src) {
                window.open(audio.src, '_blank');
            }
        }

        // ── Cinematic loop (rAF — smooth scrub) ──────────────────────────────
        // timeupdate fires ~4× per second; rAF gives 60fps scrub during drag
        function startCinematicLoop() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            function update() {
                if (!isDraggingProgress && !audio.paused) {
                    const curr = audio.currentTime;
                    const dur  = audio.duration;
                    if (dur && isFinite(dur) && dur > 0) {
                        document.getElementById('progress-bar').style.width = (curr / dur) * 100 + '%';
                        document.getElementById('current-time').innerText   = formatTime(curr);
                    }
                }
                animationFrameId = requestAnimationFrame(update);
            }
            animationFrameId = requestAnimationFrame(update);
        }

        function stopCinematicLoop() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
        }

        // ── Telemetry ─────────────────────────────────────────────────────────
        function applyMarqueeLogic() {
            const trackEl   = document.getElementById('track-name');
            const container = document.getElementById('title-container');
            trackEl.classList.remove('marquee');
            trackEl.style.width     = 'auto';
            trackEl.style.transform = '';
            if (trackEl.scrollWidth > container.clientWidth) {
                const text = trackEl.innerText;
                trackEl.innerHTML = `<span>${text}</span><span style="padding-left:100px">${text}</span>`;
                trackEl.classList.add('marquee');
                trackEl.style.setProperty('--duration', (trackEl.scrollWidth / 40) + 's');
            }
        }

        function setStatus(text, color, pulseSpeed) {
            const ind = document.getElementById('status-indicator');
            const lbl = document.getElementById('status-label');
            ind.style.background        = color;
            ind.style.boxShadow         = `0 0 10px ${color}`;
            ind.style.animationDuration = pulseSpeed;
            lbl.innerText   = text;
            lbl.style.color = color;
        }

        // ── Progress scrubbing ────────────────────────────────────────────────
        const progressContainer = document.getElementById('progress-container');

        function handleScrub(e) {
            const rect = progressContainer.getBoundingClientRect();
            const x    = Math.max(0, Math.min((e.touches ? e.touches[0].clientX : e.clientX) - rect.left, rect.width));
            const perc = x / rect.width;
            document.getElementById('progress-bar').style.width = (perc * 100) + '%';

            if (e.type === 'mouseup' || e.type === 'touchend') {
                const dur = audio.duration;
                if (dur && isFinite(dur)) audio.currentTime = dur * perc;
                isDraggingProgress = false;
                startCinematicLoop();
            }
        }

        progressContainer.addEventListener('mousedown',  e => { isDraggingProgress = true; stopCinematicLoop(); handleScrub(e); });
        progressContainer.addEventListener('touchstart', e => { isDraggingProgress = true; stopCinematicLoop(); handleScrub(e); }, { passive: false });
        document.addEventListener('mousemove', e => { if (isDraggingProgress) handleScrub(e); });
        document.addEventListener('touchmove', e => { if (isDraggingProgress) handleScrub(e); }, { passive: false });
        document.addEventListener('mouseup',   e => { if (isDraggingProgress) handleScrub(e); });
        document.addEventListener('touchend',  e => { if (isDraggingProgress) handleScrub(e); });

        // ── Helpers ───────────────────────────────────────────────────────────
        function formatTime(s) {
            return `${Math.floor(s / 60).toString().padStart(2, '0')}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        function flashVisualFeedback() {
            const bar = document.getElementById('nexus-player-bar');
            bar.style.borderColor = 'var(--accent)';
            setTimeout(() => bar.style.borderColor = '', 300);
        }
    </script>
</body>
