<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Purple glow filter -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Linear gradients -->
    <linearGradient id="rift-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#be35ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
  </defs>

  <style>
    @keyframes scan {
      0% { transform: translateY(20px); opacity: 0.3; }
      50% { transform: translateY(580px); opacity: 0.9; }
      100% { transform: translateY(20px); opacity: 0.3; }
    }
    @keyframes pulse-rift {
      0%, 100% { stroke-width: 4px; filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.5)); }
      50% { stroke-width: 7px; filter: drop-shadow(0 0 25px rgba(190, 53, 255, 0.8)); }
    }
    @keyframes float-rings {
      0% { transform: scale(0.9); opacity: 0.2; }
      50% { transform: scale(1.05); opacity: 0.6; }
      100% { transform: scale(0.9); opacity: 0.2; }
    }
    @keyframes ripple {
      0% { r: 5px; opacity: 0.8; }
      100% { r: 80px; opacity: 0; }
    }
    .hud-line {
      stroke: #00f0ff;
      stroke-opacity: 0.15;
    }
    .scanner {
      animation: scan 6s infinite ease-in-out;
    }
    .rift-path {
      animation: pulse-rift 4s infinite ease-in-out;
    }
    .pulse-circle {
      transform-origin: 200px 300px;
      animation: float-rings 5s infinite ease-in-out;
    }
    .ripple-effect {
      transform-origin: 200px 300px;
      animation: ripple 3s infinite linear;
    }
  </style>

  <!-- Deep space background -->
  <rect width="100%" height="100%" fill="#04060b" />
  
  <!-- Cybernetic Grid Overlay -->
  <g stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.05">
    <line x1="50" y1="0" x2="50" y2="600" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="150" y1="0" x2="150" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="250" y1="0" x2="250" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="350" y1="0" x2="350" y2="600" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="400" x2="400" y2="400" />
    <line x1="0" y1="500" x2="400" y2="500" />
  </g>

  <!-- Corner HUD brackets -->
  <g stroke="#00f0ff" stroke-width="2" stroke-opacity="0.4" fill="none">
    <path d="M 20,40 L 20,20 L 40,20" />
    <path d="M 380,40 L 380,20 L 360,20" />
    <path d="M 20,560 L 20,580 L 40,580" />
    <path d="M 380,560 L 380,580 L 360,580" />
  </g>

  <!-- Distant mechanical structural lines -->
  <g stroke="#be35ff" stroke-width="1.5" stroke-opacity="0.15" fill="none">
    <rect x="40" y="40" width="320" height="520" />
    <line x1="40" y1="150" x2="360" y2="150" />
    <line x1="40" y1="450" x2="360" y2="450" />
    <line x1="120" y1="40" x2="120" y2="560" />
    <line x1="280" y1="40" x2="280" y2="560" />
  </g>

  <!-- Glowing ripples emanating from the center of the rift -->
  <circle cx="200" cy="300" r="0" fill="none" stroke="#be35ff" stroke-width="1.5" class="ripple-effect" filter="url(#glow-purple)" />
  <circle cx="200" cy="300" r="0" fill="none" stroke="#00f0ff" stroke-width="1" class="ripple-effect" style="animation-delay: 1.5s;" filter="url(#glow-cyan)" />

  <!-- Concentric reality distortion rings -->
  <circle cx="200" cy="300" r="90" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="10,15" stroke-opacity="0.4" class="pulse-circle" />
  <circle cx="200" cy="300" r="120" fill="none" stroke="#be35ff" stroke-width="1" stroke-dasharray="3,6" stroke-opacity="0.3" class="pulse-circle" style="animation-delay: -2.5s;" />

  <!-- The Great Rift - Continent spanning energy tear -->
  <path d="M 200,40 Q 180,150 210,300 T 200,560" fill="none" stroke="url(#rift-grad)" stroke-linecap="round" class="rift-path" filter="url(#glow-purple)" />
  <path d="M 200,40 Q 180,150 210,300 T 200,560" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.8" />

  <!-- Horizontal red scanner overlay line -->
  <g class="scanner">
    <line x1="40" y1="0" x2="360" y2="0" stroke="#00f0ff" stroke-width="2" filter="url(#glow-cyan)" />
    <line x1="20" y1="0" x2="380" y2="0" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.5" />
    <circle cx="200" cy="0" r="4" fill="#ffffff" filter="url(#glow-cyan)" />
  </g>

  <!-- Interactive status/readout text -->
  <g font-family="'Share Tech Mono', monospace" font-size="11" letter-spacing="1">
    <text x="50" y="70" fill="#00f0ff" fill-opacity="0.7">STATUS: MONITORING</text>
    <text x="350" y="70" fill="#be35ff" fill-opacity="0.7" text-anchor="end">SYS_VER: 4.8A</text>
    
    <!-- Central HUD rank label -->
    <rect x="155" y="288" width="90" height="24" fill="#04060b" stroke="#00f0ff" stroke-width="1.5" rx="3" />
    <text x="200" y="304" fill="#00f0ff" font-family="'Orbitron', sans-serif" font-weight="700" font-size="12" text-anchor="middle" letter-spacing="1">S-CLASS</text>

    <!-- Bottom Readout -->
    <text x="200" y="525" fill="#ffe600" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="2" filter="url(#glow-cyan)">WARNING: REALITY CRITICAL</text>
    <text x="200" y="545" fill="#94a3b8" text-anchor="middle" letter-spacing="3">ARCANIS // THE GREAT RIFT</text>
  </g>
</svg>
