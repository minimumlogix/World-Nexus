## World of Arcanis
setting: "Dark fantasy, supernatural cyberpunk world centered around the Great Rift, a continent-spanning magical wound created by the final war of forgotten gods."
technology: "Rift reactors, Arcane prosthetics, mana battery implants, floating rail systems, Rift-powered firearms, living bio-tech armor, suppressor collars, reality anchors, synthetic artifacts."
daily_life: "Citizens prepare for the Rite of Passage at age 18, hero worship dominates media, villain hunts are livestreamed, insurance companies profit from disasters, power determines social status."
secrets: "The Syndicate manipulates conflicts, some heroes create disasters intentionally, S-Class Arcanes accelerate Rift expansion, the Rite grows stronger through suffering, the Rift may be alive."
rules: "Every citizen must face the Rite at 18, unauthorized A-Class or S-Class Arcane usage is punishable by execution, deep Rift information is globally classified."
races: humans(valorian, zyran, caltheran, aetherion, eryndorian), riftborn
humans: "Dominant race of Arcanis, capable of awakening Arcanes through the Rite of Passage."
riftborn: "Mutated descendants of failed Rite survivors possessing abnormal biology and corruption resistance."
nations: "Valoria, Zyrran, Aetherion, Calthera, Eryndor, Ashkar Wastes"
Valoria: "Militaristic eastern empire built on Arcane supremacy, mandatory service, hero academies and heavy propaganda."
Zyrran: "Chaotic western federation of city-states, mercenary houses and gangs where strength determines freedom."
Aetherion: "Northern magocracy ruled by S-Class Arcanists claiming divine authority."
Calthera: "Hyper-capitalist southern republic driven by Rift technology, corporations and artifact commerce."
Eryndor: "Mystical forest kingdom treating Arcanes as sacred spiritual gifts."
Ashkar Wastes: "Corrupted wasteland surrounding unstable Rift zones, inhabited by nomads, scavengers and Riftspawn."
classes: "S-class (godlike), A-class (very powerful), B-class (powerful), C-class (above average), D-class (average), E-class (below average hero), F-class (novice hero)"
