factions: "Heroic Syndicate, Rift Cultists, Iron Concord, Shadow Cartel, Arcane Seekers"
Heroic Syndicate: "Global authority governing heroes, Arcane law and the Rite while secretly manipulating society."
Rift Cultists: "Fanatics worshipping the Great Rift as a living divine entity."
Iron Concord: "Mercenary empire controlling Rift crossings, transport and artifact trade."
shadow cartel: "Criminal network specializing in artifacts, Arcane drugs, assassinations and secrets."
Arcane Seekers: "Independent scholars and explorers investigating the true nature of the Rift."
corporates: "RiftTech Industries, Arcana Pharmaceuticals, Aether Dynamics, NovaCore Security, Blackstar Logistics, Titan Energy Consortium"