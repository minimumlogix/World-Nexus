<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="world-svg-logo">
  <style>
    .iron-stroke {
      stroke: #736d66;
      fill: none;
    }
    .iron-fill {
      fill: #4a4542;
    }
    .blood-stroke {
      stroke: #ba182b;
      fill: none;
    }
    .blood-fill {
      fill: #ff2a4b;
    }
    .blood-pulse {
      animation: pulse 3s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 6px rgba(255, 42, 75, 0.6));
    }
    .drip {
      animation: drop 4s ease-in infinite;
      opacity: 0;
    }
    @keyframes pulse {
      0% { opacity: 0.7; transform: scale(0.98); transform-origin: center; }
      100% { opacity: 1; transform: scale(1.02); transform-origin: center; filter: drop-shadow(0 0 10px rgba(255, 42, 75, 0.9)); }
    }
    @keyframes drop {
      0% { transform: translateY(0); opacity: 1; }
      80% { transform: translateY(15px); opacity: 1; }
      100% { transform: translateY(20px); opacity: 0; }
    }
  </style>

  <!-- Background Halo (Empty Circle in ash/blood) -->
  <circle class="blood-stroke" cx="50" cy="50" r="45" style="stroke-width: 1; opacity: 0.3; stroke-dasharray: 4 2;" />
  <circle class="iron-stroke" cx="50" cy="50" r="42" style="stroke-width: 0.5; opacity: 0.5;" />

  <!-- The Crown of Veyrath -->
  <g transform="translate(0, 5)">
    <!-- Crown Base -->
    <path class="iron-fill" d="M 20,65 Q 50,75 80,65 L 75,55 Q 50,65 25,55 Z" style="stroke: #111; stroke-width: 1;" />
    
    <!-- Crown Spikes -->
    <polygon class="iron-fill" points="25,55 15,25 35,45" style="stroke: #111; stroke-width: 0.5;" />
    <polygon class="iron-fill" points="35,45 35,15 50,45" style="stroke: #111; stroke-width: 0.5;" />
    <polygon class="iron-fill" points="50,45 50,5 65,45" style="stroke: #111; stroke-width: 0.5;" />
    <polygon class="iron-fill" points="65,45 85,25 75,55" style="stroke: #111; stroke-width: 0.5;" />
    <polygon class="iron-fill" points="50,45 65,15 65,45" style="stroke: #111; stroke-width: 0.5;" />
    
    <!-- Spire Jewels (Blood Drops) -->
    <circle class="blood-fill blood-pulse" cx="15" cy="22" r="2.5" />
    <circle class="blood-fill blood-pulse" cx="35" cy="12" r="3" />
    <circle class="blood-fill blood-pulse" cx="50" cy="2" r="4" />
    <circle class="blood-fill blood-pulse" cx="65" cy="12" r="3" />
    <circle class="blood-fill blood-pulse" cx="85" cy="22" r="2.5" />
  </g>

  <!-- Crimson Veins piercing the crown -->
  <g class="blood-stroke" style="stroke-width: 1.5; stroke-linecap: round;">
    <!-- Central Vein -->
    <path d="M 50,85 Q 45,65 50,45 Q 55,25 50,15" />
    <path d="M 50,65 Q 40,55 35,40" />
    <path d="M 50,55 Q 60,45 65,30" />
    
    <!-- Side Veins -->
    <path d="M 30,80 Q 25,60 30,40" />
    <path d="M 70,80 Q 75,60 70,40" />
  </g>

  <!-- Dripping Blood -->
  <circle class="blood-fill drip" cx="50" cy="85" r="1.5" />
  <circle class="blood-fill drip" cx="35" cy="42" r="1" style="animation-delay: 1.5s;" />
  <circle class="blood-fill drip" cx="65" cy="32" r="1" style="animation-delay: 0.8s;" />
</svg>
