<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <!-- Dark slate background -->
  <rect width="100%" height="100%" fill="#141316" />
  
  <!-- Subtle mist/fog effect (abstract shapes) -->
  <g fill="#736d66" opacity="0.05">
    <circle cx="100" cy="500" r="150" />
    <circle cx="350" cy="450" r="200" />
    <circle cx="200" cy="550" r="250" />
  </g>
  
  <!-- Ritual circle and sword -->
  <g stroke="#ff2a4b" stroke-opacity="0.4" stroke-width="1.5" fill="none">
    <!-- Concentric circles -->
    <circle cx="200" cy="300" r="120" />
    <circle cx="200" cy="300" r="110" />
    <circle cx="200" cy="300" r="60" />
    
    <!-- Intersecting triangles (Hexagram/Ritual shape) -->
    <polygon points="200,180 304,360 96,360" />
    <polygon points="200,420 304,240 96,240" />
  </g>

  <!-- Giant iron sword driven into the center -->
  <g stroke="#b5b1a8" stroke-width="3" fill="#1f1b1e">
    <!-- Blade -->
    <polygon points="200,100 215,150 215,400 200,450 185,400 185,150" />
    <!-- Crossguard -->
    <rect x="160" y="140" width="80" height="15" rx="4" />
    <!-- Handle -->
    <rect x="190" y="90" width="20" height="50" />
    <!-- Pommel -->
    <circle cx="200" cy="80" r="12" />
  </g>
  
  <!-- Blood glow in the center -->
  <circle cx="200" cy="300" r="30" fill="#ba182b" opacity="0.3" filter="blur(10px)" />
</svg>
