<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Magenta glow filter -->
    <filter id="glow-magenta" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes sun-pulse {
      0%, 100% { filter: drop-shadow(0 0 10px #ff0055) opacity(0.85); transform: scale(1); }
      50% { filter: drop-shadow(0 0 20px #ff0055) opacity(1); transform: scale(1.03); }
    }
    @keyframes grid-flow {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes wireframe-flicker {
      0%, 93%, 97%, 100% { opacity: 0.3; }
      95% { opacity: 0.75; }
    }
    @keyframes scanline {
      0% { transform: translateY(20px); opacity: 0.15; }
      50% { transform: translateY(560px); opacity: 0.45; }
      100% { transform: translateY(20px); opacity: 0.15; }
    }
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes drone-drift {
      0% { transform: translate(450px, 80px) scale(0.7); }
      100% { transform: translate(-80px, 110px) scale(0.7); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    .sun {
      transform-origin: 200px 220px;
      animation: sun-pulse 4s infinite ease-in-out;
    }
    .grid-energy {
      stroke-dasharray: 10, 20;
      animation: grid-flow 1.2s infinite linear;
    }
    .peaks {
      animation: wireframe-flicker 6s infinite ease-in-out;
    }
    .scanner-line {
      animation: scanline 8s infinite ease-in-out;
    }
    .spin-clockwise {
      transform-origin: 200px 220px;
      animation: spin-cw 20s infinite linear;
    }
    .drone-fly {
      animation: drone-drift 22s infinite linear;
    }
    .drone-indicator {
      animation: blink 0.6s infinite steps(2);
    }
  </style>

  <!-- Dark carbon background -->
  <rect width="100%" height="100%" fill="#07090e" />
  
  <!-- Perspective grids on floor -->
  <g stroke="#ff0055" stroke-opacity="0.18" stroke-width="1.5">
    <!-- Perspective lines originating from a horizon point (200, 250) -->
    <line x1="200" y1="250" x2="-200" y2="600" />
    <line x1="200" y1="250" x2="-50" y2="600" />
    <line x1="200" y1="250" x2="100" y2="600" />
    <line x1="200" y1="250" x2="200" y2="600" />
    <line x1="200" y1="250" x2="300" y2="600" />
    <line x1="200" y1="250" x2="450" y2="600" />
    <line x1="200" y1="250" x2="600" y2="600" />
    
    <!-- Horizontal floor bars -->
    <line x1="0" y1="255" x2="400" y2="255" stroke-opacity="0.05" />
    <line x1="0" y1="270" x2="400" y2="270" stroke-opacity="0.08" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="340" x2="400" y2="340" />
    <line x1="0" y1="390" x2="400" y2="390" />
    <line x1="0" y1="450" x2="400" y2="450" />
    <line x1="0" y1="520" x2="400" y2="520" />
    <line x1="0" y1="600" x2="400" y2="600" />
  </g>

  <!-- Flowing Grid Energy Pulses -->
  <g stroke="#ff0055" stroke-width="1.8" fill="none" class="grid-energy" filter="url(#glow-magenta)">
    <line x1="200" y1="250" x2="-200" y2="600" />
    <line x1="200" y1="250" x2="-50" y2="600" />
    <line x1="200" y1="250" x2="100" y2="600" />
    <line x1="200" y1="250" x2="200" y2="600" />
    <line x1="200" y1="250" x2="300" y2="600" />
    <line x1="200" y1="250" x2="450" y2="600" />
    <line x1="200" y1="250" x2="600" y2="600" />
  </g>
  
  <!-- Sun / synthwave disc in the center background -->
  <circle cx="200" cy="220" r="70" fill="#ff0055" class="sun" />
  <circle cx="200" cy="220" r="68" fill="#07090e" />
  
  <!-- Horizontal slices for retro sun look -->
  <g fill="#07090e">
    <rect x="120" y="210" width="160" height="4" />
    <rect x="120" y="225" width="160" height="6" />
    <rect x="120" y="240" width="160" height="8" />
    <rect x="120" y="255" width="160" height="10" />
  </g>

  <!-- Target HUD Ring around Sun -->
  <circle cx="200" cy="220" r="85" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="8,16" stroke-opacity="0.3" class="spin-clockwise" />
  <circle cx="200" cy="220" r="90" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-dasharray="2,30" stroke-opacity="0.4" class="spin-clockwise" style="animation-duration: 10s;" />

  <!-- Glowing neon grid peaks with chromatic aberration (glitch) -->
  <g class="peaks" fill="none" stroke-width="1.5">
    <!-- Cyan Offset peaks -->
    <g stroke="#00f0ff" stroke-opacity="0.3">
      <polygon points="49,250 99,180 149,250" />
      <polygon points="119,250 199,130 279,250" />
      <polygon points="249,250 309,190 369,250" />
    </g>
    <!-- Magenta Offset peaks -->
    <g stroke="#ff0055" stroke-opacity="0.3">
      <polygon points="51,250 101,180 151,250" />
      <polygon points="121,250 201,130 281,250" />
      <polygon points="251,250 311,190 371,250" />
    </g>
    <!-- White center highlights -->
    <g stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.75">
      <polygon points="50,250 100,180 150,250" />
      <polygon points="120,250 200,130 280,250" />
      <polygon points="250,250 310,190 370,250" />
    </g>
  </g>

  <!-- Drifting Surveillance Drones in smoggy sky -->
  <g class="drone-fly">
    <path d="M 0,0 L 10,-3 L 20,0 L 10,5 Z" fill="#0d1117" stroke="#ff0055" stroke-width="1" />
    <circle cx="10" cy="0" r="1.8" fill="#00f0ff" class="drone-indicator" filter="url(#glow-cyan)" />
    <!-- Drone tracking laser beam (subtle) -->
    <polygon points="10,0 -20,180 40,180" fill="url(#laser-beam)" opacity="0.08" pointer-events="none" />
  </g>

  <!-- Gradients definitions -->
  <defs>
    <linearGradient id="laser-beam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff0055" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff0055" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Technical border frame -->
  <rect x="15" y="15" width="370" height="570" fill="none" stroke="#00f0ff" stroke-opacity="0.15" stroke-width="1" />
  <rect x="20" y="20" width="360" height="560" fill="none" stroke="#ff0055" stroke-opacity="0.1" stroke-width="0.5" />

  <!-- Sweeping cyber scanner overlay -->
  <g class="scanner-line">
    <line x1="20" y1="0" x2="380" y2="0" stroke="#00f0ff" stroke-width="1.2" stroke-opacity="0.4" filter="url(#glow-cyan)" />
    <circle cx="200" cy="0" r="2.5" fill="#ffffff" filter="url(#glow-cyan)" />
  </g>

  <!-- Telemetry and label markings -->
  <g fill="#00f0ff" font-family="monospace" font-size="10" opacity="0.8">
    <text x="30" y="45" opacity="0.5">LOC: SEC_88 // GRID</text>
    <text x="30" y="60" opacity="0.5">NET_STRENGTH: 98.4%</text>
    
    <text x="370" y="45" opacity="0.5" text-anchor="end">ZENARK_SYSTEMS</text>
    <text x="370" y="60" opacity="0.5" text-anchor="end">STATUS: SECURE</text>

    <!-- Bottom label -->
    <text x="200" y="550" fill="#00f0ff" font-family="'Orbitron', sans-serif" font-weight="700" font-size="11" text-anchor="middle" letter-spacing="2" filter="url(#glow-cyan)">NEONVEIL: NEURAL_GRID_V2</text>
  </g>
</svg>
