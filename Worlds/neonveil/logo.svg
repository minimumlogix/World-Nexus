<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" class="neonveil-logo world-svg-logo" aria-label="Neonveil Logo" role="img">
  <title>Neonveil Logo</title>
  <desc>A cyber-themed neon logo featuring a central V inside a glowing triangle and an outer circle.</desc>

  <defs>
    <!-- Technical background grid for depth -->
    <pattern id="cyber-grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="var(--neon-dark, #aa0000)" stroke-width="0.3" opacity="0.3" />
    </pattern>
    
    <!-- Native SVG filter guarantees cross-browser neon glow, even inside <img> tags -->
    <filter id="neon-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .neonveil-logo {
      /* Centralized design tokens */
      --neon-primary: #ff1a1a;
      --neon-dark: #aa0000;
    }

    .cyber-triangle {
      stroke: var(--neon-primary);
      stroke-width: 2;
      fill: none;
      stroke-linejoin: round;
      stroke-linecap: round;
      /* Precise perimeter calculation: 70 (base) + 2 * 69.46 (sides) = 208.92 */
      stroke-dasharray: 209;
      stroke-dashoffset: 209;
      animation: triangle-draw 2.5s ease-in-out infinite alternate;
      filter: url(#neon-blur);
    }

    .neon-glow {
      stroke: var(--neon-primary);
      stroke-width: 1.5;
      stroke-linecap: round;
      fill: none;
      filter: url(#neon-blur);
      animation: pulse-glow 1.5s ease-in-out infinite alternate;
    }

    .neonveil-logo-text {
      fill: var(--neon-primary);
      font-family: 'Orbitron', 'Courier New', Courier, monospace, sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 3px;
      text-rendering: geometricPrecision;
    }

    .logo-v {
      fill: var(--neon-primary);
      stroke: var(--neon-dark);
      stroke-width: 0.5;
      stroke-linejoin: round;
      animation: v-pulse 2.5s ease-in-out infinite alternate;
    }

    .circle-bg {
      stroke: var(--neon-dark);
      stroke-width: 1;
      fill: none;
      opacity: 0.4;
    }
  </style>

  <!-- Background layer -->
  <rect width="100" height="100" fill="url(#cyber-grid)" />
  <circle cx="50" cy="45" r="30" class="circle-bg" shape-rendering="geometricPrecision" />
  
  <!-- Core geometry layer -->
  <path class="logo-v" d="M 40 30 L 50 60 L 60 30 L 55 30 L 50 50 L 45 30 Z" shape-rendering="geometricPrecision" />

  <!-- Animated geometry layer -->
  <path class="cyber-triangle" d="M 50 10 L 85 70 L 15 70 Z" shape-rendering="geometricPrecision" />

  <!-- Typography & Accents -->
  <text x="50" y="85" class="neonveil-logo-text" text-anchor="middle">NEONVEIL</text>
  <path class="neon-glow" d="M 20 90 L 80 90" shape-rendering="geometricPrecision" />
</svg>