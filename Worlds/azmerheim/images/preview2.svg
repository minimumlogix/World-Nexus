<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <!-- Aether blue glow filter -->
    <filter id="glow-aether" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px #38bdf8); }
      50% { transform: scale(1.12); filter: drop-shadow(0 0 18px #00d4ff); }
    }
    @keyframes expand-pulse {
      0% { r: 20px; opacity: 0.7; }
      100% { r: 150px; opacity: 0; }
    }
    @keyframes needle-wiggle-fast {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(5deg); }
      40% { transform: rotate(-3deg); }
      60% { transform: rotate(8deg); }
      80% { transform: rotate(-4deg); }
    }
    @keyframes needle-wiggle-slow {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-6deg); }
      50% { transform: rotate(3deg); }
      75% { transform: rotate(-4deg); }
    }
    @keyframes flow-inward {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes crackle {
      0%, 100% { opacity: 0; }
      10%, 12%, 14%, 60%, 62%, 64% { opacity: 1; stroke-width: 1.5px; }
      11%, 13%, 15%, 61%, 63%, 65% { opacity: 0; }
    }
    @keyframes scanline-vertical {
      0% { transform: translateY(20px); opacity: 0.1; }
      50% { transform: translateY(560px); opacity: 0.35; }
      100% { transform: translateY(20px); opacity: 0.1; }
    }

    .gear-spin-cw {
      transform-origin: 200px 250px;
      animation: spin-cw 25s infinite linear;
    }
    .dial-spin-ccw {
      transform-origin: 200px 250px;
      animation: spin-ccw 18s infinite linear;
    }
    .crystal-core-pulse {
      transform-origin: 200px 250px;
      animation: pulse-core 3.5s infinite ease-in-out;
    }
    .pulse-ring {
      transform-origin: 200px 250px;
      animation: expand-pulse 4.5s infinite ease-out;
    }
    .gauge-needle-fast {
      animation: needle-wiggle-fast 1.5s infinite ease-in-out;
    }
    .gauge-needle-slow {
      animation: needle-wiggle-slow 2.2s infinite ease-in-out;
    }
    .aether-flow-line {
      stroke-dasharray: 6, 12;
      animation: flow-inward 1.8s infinite linear;
    }
    .overclock-sparks {
      animation: crackle 3.5s infinite linear;
    }
    .scanner-line {
      animation: scanline-vertical 10s infinite ease-in-out;
    }
  </style>

  <!-- Aged brass blueprint grid background -->
  <rect width="100%" height="100%" fill="#120d09" />
  
  <!-- Perspective blueprint grids -->
  <g stroke="#d48c54" stroke-opacity="0.08" stroke-width="1">
    <circle cx="200" cy="250" r="180" fill="none" />
    <circle cx="200" cy="250" r="140" fill="none" />
    <circle cx="200" cy="250" r="100" fill="none" />
    <circle cx="200" cy="250" r="60" fill="none" />
    
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="200" y1="50" x2="200" y2="450" />
    <line x1="72" y1="122" x2="328" y2="378" />
    <line x1="72" y1="378" x2="328" y2="122" stroke-dasharray="4,4" />
  </g>

  <!-- Technical border frame -->
  <rect x="15" y="15" width="370" height="570" fill="none" stroke="#d48c54" stroke-opacity="0.2" stroke-width="1" />
  <rect x="20" y="20" width="360" height="560" fill="none" stroke="#d48c54" stroke-opacity="0.1" stroke-width="0.5" />

  <!-- Expanding Aetheric Resonance Rings -->
  <circle cx="200" cy="250" r="20" fill="none" stroke="#38bdf8" stroke-width="1.5" class="pulse-ring" filter="url(#glow-aether)" />
  <circle cx="200" cy="250" r="20" fill="none" stroke="#38bdf8" stroke-width="0.75" stroke-dasharray="4,8" class="pulse-ring" style="animation-delay: 2.25s;" filter="url(#glow-aether)" />

  <!-- Rotating Steampunk Gear Ring -->
  <g class="gear-spin-cw" stroke="#d48c54" stroke-opacity="0.65" stroke-width="1.5" fill="none">
    <!-- Outer Gear teeth design -->
    <circle cx="200" cy="250" r="80" stroke-dasharray="12,6" stroke-width="4" />
    <circle cx="200" cy="250" r="74" />
    <circle cx="200" cy="250" r="88" stroke-width="0.5" stroke-opacity="0.2" />
  </g>

  <!-- Smaller Meshing Gears (Rotating CCW) -->
  <!-- Top Left Gear -->
  <g class="spin-ccw" style="transform-origin: 105px 175px; animation-duration: 12.5s;" stroke="#d48c54" stroke-opacity="0.4" stroke-width="1" fill="none">
    <circle cx="105" cy="175" r="40" stroke-dasharray="6,4" />
    <circle cx="105" cy="175" r="10" stroke-opacity="0.2" />
    <line x1="65" y1="175" x2="145" y2="175" stroke-opacity="0.15" />
    <line x1="105" y1="135" x2="105" y2="215" stroke-opacity="0.15" />
  </g>
  <!-- Top Right Gear -->
  <g class="spin-ccw" style="transform-origin: 295px 175px; animation-duration: 12.5s;" stroke="#d48c54" stroke-opacity="0.4" stroke-width="1" fill="none">
    <circle cx="295" cy="175" r="40" stroke-dasharray="6,4" />
    <circle cx="295" cy="175" r="10" stroke-opacity="0.2" />
    <line x1="255" y1="175" x2="335" y2="175" stroke-opacity="0.15" />
    <line x1="295" y1="135" x2="295" y2="215" stroke-opacity="0.15" />
  </g>
  <!-- Bottom Center Gear -->
  <g class="spin-ccw" style="transform-origin: 200px 370px; animation-duration: 12.5s;" stroke="#d48c54" stroke-opacity="0.4" stroke-width="1" fill="none">
    <circle cx="200" cy="370" r="40" stroke-dasharray="6,4" />
    <circle cx="200" cy="370" r="10" stroke-opacity="0.2" />
    <line x1="160" y1="370" x2="240" y2="370" stroke-opacity="0.15" />
    <line x1="200" y1="330" x2="200" y2="410" stroke-opacity="0.15" />
  </g>

  <!-- Rotating Dial Gauge (CCW) -->
  <g class="dial-spin-ccw" stroke="#d48c54" stroke-opacity="0.4" stroke-width="1" fill="none">
    <circle cx="200" cy="250" r="115" stroke-dasharray="2,14" stroke-width="3" />
    <circle cx="200" cy="250" r="120" stroke-dasharray="40,15,5,15" />
    <path d="M 200,130 L 200,135 M 200,365 L 200,370" stroke-width="2" stroke-opacity="0.7" />
  </g>

  <!-- Heavy copper framing (static) -->
  <g stroke="#d48c54" stroke-opacity="0.7" stroke-width="1.5" fill="none">
    <polygon points="150,150 250,150 280,250 250,350 150,350 120,250" />
    <!-- Rivet details -->
    <circle cx="150" cy="150" r="3" fill="#120d09" />
    <circle cx="250" cy="150" r="3" fill="#120d09" />
    <circle cx="280" cy="250" r="3" fill="#120d09" />
    <circle cx="250" cy="350" r="3" fill="#120d09" />
    <circle cx="150" cy="350" r="3" fill="#120d09" />
    <circle cx="120" cy="250" r="3" fill="#120d09" />
  </g>

  <!-- Energy feeding conduits -->
  <g stroke="#d48c54" stroke-opacity="0.3" stroke-width="2" fill="none">
    <line x1="150" y1="150" x2="180" y2="210" />
    <line x1="250" y1="150" x2="220" y2="210" />
    <line x1="250" y1="350" x2="220" y2="290" />
    <line x1="150" y1="350" x2="180" y2="290" />
  </g>

  <!-- Glowing aether energy flowing along conduits -->
  <g stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" fill="none" class="aether-flow-line" filter="url(#glow-aether)">
    <line x1="150" y1="150" x2="180" y2="210" />
    <line x1="250" y1="150" x2="220" y2="210" />
    <line x1="250" y1="350" x2="220" y2="290" />
    <line x1="150" y1="350" x2="180" y2="290" />
  </g>

  <!-- Pressure and Flow Gauges at the bottom corners -->
  <!-- Left Gauge (Aether Flow) -->
  <g stroke="#d48c54" stroke-opacity="0.6" stroke-width="1.2" fill="none">
    <circle cx="80" cy="420" r="22" />
    <circle cx="80" cy="420" r="2" fill="#d48c54" />
    <!-- Ticks -->
    <line x1="80" y1="398" x2="80" y2="403" />
    <line x1="58" y1="420" x2="63" y2="420" />
    <line x1="102" y1="420" x2="97" y2="420" />
    <g class="gauge-needle-slow" style="transform-origin: 80px 420px;">
      <line x1="80" y1="420" x2="68" y2="408" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" filter="url(#glow-aether)" />
    </g>
  </g>
  <!-- Right Gauge (Boiler Temp / Steam Pressure) -->
  <g stroke="#d48c54" stroke-opacity="0.6" stroke-width="1.2" fill="none">
    <circle cx="320" cy="420" r="22" />
    <circle cx="320" cy="420" r="2" fill="#d48c54" />
    <!-- Ticks -->
    <line x1="320" y1="398" x2="320" y2="403" />
    <line x1="298" y1="420" x2="303" y2="420" />
    <line x1="342" y1="420" x2="337" y2="420" />
    <g class="gauge-needle-fast" style="transform-origin: 320px 420px;">
      <line x1="320" y1="420" x2="334" y2="406" stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" />
    </g>
  </g>

  <!-- Pulsing Aetheric Crystal Cluster Core -->
  <g class="crystal-core-pulse">
    <!-- Main central crystal -->
    <polygon points="200,195 214,240 200,305 186,240" fill="#38bdf8" fill-opacity="0.3" stroke="#38bdf8" stroke-width="2" filter="url(#glow-aether)" />
    <!-- Secondary crystals flanking it -->
    <polygon points="183,215 200,235 180,285 170,250" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.7" />
    <polygon points="217,215 230,250 220,285 200,235" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.7" />
    <!-- Bright hot white center core line -->
    <line x1="200" y1="210" x2="200" y2="290" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" filter="url(#glow-aether)" />
  </g>

  <!-- Overclocking erratic sparks -->
  <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.8" fill="none" class="overclock-sparks" filter="url(#glow-aether)">
    <path d="M 200,185 L 204,175 L 196,168" />
    <path d="M 235,250 L 244,244 L 253,252" />
    <path d="M 200,315 L 196,325 L 204,332" />
    <path d="M 165,250 L 156,256 L 147,248" />
  </g>

  <!-- Vertical telemetry scanner sweep -->
  <g class="scanner-line">
    <line x1="20" y1="0" x2="380" y2="0" stroke="#38bdf8" stroke-width="0.75" stroke-opacity="0.3" filter="url(#glow-aether)" />
  </g>

  <!-- Technical Telemetry & Calibration labels -->
  <g fill="#d48c54" font-family="monospace" font-size="10" opacity="0.8">
    <!-- Calibration ticks -->
    <text x="30" y="45" opacity="0.5">V_CAL: 89.21</text>
    <text x="30" y="60" opacity="0.5">P_CAL: 04.99</text>
    
    <text x="370" y="45" opacity="0.5" text-anchor="end">TEMP: 280 C</text>
    <text x="370" y="60" opacity="0.5" text-anchor="end">AETHER_FLOW: MAX</text>

    <text x="50" y="482" fill="#8b7465">CORE_OUTPUT: 84%</text>
    <text x="350" y="482" fill="#8b7465" text-anchor="end">PRESSURE: 4.2 BAR</text>

    <!-- Mechanism descriptions -->
    <text x="200" y="512" text-anchor="middle" font-family="'Orbitron', sans-serif" font-weight="700" letter-spacing="2">AETHERIC_REACTOR_MK4</text>
    <text x="200" y="530" text-anchor="middle" font-size="8.5" opacity="0.6" letter-spacing="1">REGISTRATION: SECURE_COALITION_PROPERTY</text>
    <text x="200" y="548" text-anchor="middle" font-size="8.5" fill="#38bdf8" opacity="0.9" letter-spacing="1" filter="url(#glow-aether)">REACTOR INTEGRITY: STABLE_100%</text>
  </g>
</svg>
