<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <!-- Telemetry Amber glow filter -->
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Telemetry Cyan glow filter -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes type-1 { 0%, 5% { opacity: 0; } 10%, 100% { opacity: 1; } }
    @keyframes type-2 { 0%, 15% { opacity: 0; } 20%, 100% { opacity: 1; } }
    @keyframes type-3 { 0%, 25% { opacity: 0; } 30%, 100% { opacity: 1; } }
    @keyframes type-4 { 0%, 35% { opacity: 0; } 40%, 100% { opacity: 1; } }
    @keyframes type-5 { 0%, 45% { opacity: 0; } 50%, 100% { opacity: 1; } }
    @keyframes type-6 { 0%, 55% { opacity: 0; } 60%, 100% { opacity: 1; } }
    @keyframes type-7 { 0%, 65% { opacity: 0; } 70%, 100% { opacity: 1; } }
    @keyframes blink-cursor { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse-node {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px #f39e37); fill: #ffffff; }
      50% { transform: scale(1.25); filter: drop-shadow(0 0 12px #f39e37); fill: #f39e37; }
    }
    @keyframes telemetry-flow {
      0% { transform: translateY(200px); opacity: 0; }
      15%, 85% { opacity: 0.4; }
      100% { transform: translateY(480px); opacity: 0; }
    }
    @keyframes scanline-vertical {
      0% { transform: translateY(20px); opacity: 0.1; }
      50% { transform: translateY(560px); opacity: 0.35; }
      100% { transform: translateY(20px); opacity: 0.1; }
    }

    .term-line-1 { animation: type-1 10s infinite linear; }
    .term-line-2 { animation: type-2 10s infinite linear; }
    .term-line-3 { animation: type-3 10s infinite linear; }
    .term-line-4 { animation: type-4 10s infinite linear; }
    .term-line-5 { animation: type-5 10s infinite linear; }
    .term-line-6 { animation: type-6 10s infinite linear; }
    .term-line-7 { animation: type-7 10s infinite linear; }
    .term-cursor { animation: blink-cursor 0.8s infinite; }

    .spin-clockwise {
      transform-origin: 200px 400px;
      animation: spin-cw 20s infinite linear;
    }
    .spin-counter-clockwise {
      transform-origin: 200px 400px;
      animation: spin-ccw 14s infinite linear;
    }
    .sonar-sweep {
      transform-origin: 200px 400px;
      animation: spin-cw 4s infinite linear;
    }
    .node-pulse {
      transform-origin: 200px 400px;
      animation: pulse-node 2.5s infinite ease-in-out;
    }
    .telemetry-fall-1 {
      animation: telemetry-flow 8s infinite linear;
    }
    .telemetry-fall-2 {
      animation: telemetry-flow 6s infinite linear;
      animation-delay: 3s;
    }
    .scanner-line {
      animation: scanline-vertical 12s infinite ease-in-out;
    }
  </style>

  <!-- Deep space-black console background -->
  <rect width="100%" height="100%" fill="#0b0e14" />
  
  <!-- Perspective grids on background -->
  <g stroke="#6fe5ff" stroke-opacity="0.04" stroke-width="0.75">
    <line x1="50" y1="0" x2="50" y2="600" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="150" y1="0" x2="150" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="250" y1="0" x2="250" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="350" y1="0" x2="350" y2="600" />
  </g>

  <!-- Glowing diagnostic console logs (Typewriter simulation) -->
  <g fill="#6fe5ff" fill-opacity="0.85" font-family="monospace" font-size="10">
    <text x="25" y="40" class="term-line-1">&gt; INITIALIZING WET-SLAB SYNAPSE ARRAY... OK</text>
    <text x="25" y="65" class="term-line-2">&gt; LOAD NEURAL MATRIX MODULES: 89.2%</text>
    <text x="25" y="90" fill="#f39e37" fill-opacity="0.9" class="term-line-3">&gt; WARNING: ABNORMAL TRANSMISSION DETECTED</text>
    <text x="25" y="115" class="term-line-4">&gt; DEPTH SONAR VECTOR IP: 400.992.012</text>
    <text x="25" y="140" class="term-line-5">&gt; SCANNING SEA BED FOR AI 'DEAD-CODE'...</text>
    <text x="25" y="165" fill="#f39e37" fill-opacity="0.9" class="term-line-6">&gt; CRITICAL: AEGIS ARRAY ENGAGING SYSTEM TARGET</text>
    <text x="25" y="190" class="term-line-7">&gt; OVERRIDING COGNITIVE SANCTION... OK</text>
    
    <!-- Blinking command cursor -->
    <rect x="250" y="180" width="6" height="10" fill="#6fe5ff" class="term-cursor" />
  </g>

  <!-- Scrolling Hex Data Streams on Margins -->
  <g fill="#6fe5ff" fill-opacity="0.25" font-family="monospace" font-size="7" class="telemetry-fall-1">
    <text x="25" y="0">0x3F28</text>
    <text x="25" y="15">0x99AA</text>
    <text x="25" y="30">0xFFE4</text>
    <text x="25" y="45">0x00B2</text>
    <text x="25" y="60">0x421D</text>
    <text x="25" y="75">0x77EC</text>
  </g>
  <g fill="#f39e37" fill-opacity="0.25" font-family="monospace" font-size="7" class="telemetry-fall-2">
    <text x="345" y="0">SLAB_1</text>
    <text x="345" y="15">SLAB_2</text>
    <text x="345" y="30">ERROR</text>
    <text x="345" y="45">STABLE</text>
    <text x="345" y="60">FLOW_A</text>
    <text x="345" y="75">FLOW_B</text>
  </g>

  <!-- Depth Sonar Scan / Wet-Slab HUD element in the bottom -->
  <!-- Outer static HUD circle -->
  <circle cx="200" cy="400" r="120" fill="none" stroke="#6fe5ff" stroke-opacity="0.1" stroke-width="1" />
  
  <!-- Outer rotating circle -->
  <circle cx="200" cy="400" r="100" fill="none" stroke="#f39e37" stroke-opacity="0.3" stroke-width="2" class="spin-clockwise" />
  
  <!-- Middle dashed rotating circle -->
  <circle cx="200" cy="400" r="80" fill="none" stroke="#6fe5ff" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="25,12" class="spin-counter-clockwise" />
  
  <!-- Inner static concentric line -->
  <circle cx="200" cy="400" r="50" fill="none" stroke="#f39e37" stroke-opacity="0.3" stroke-width="1.2" />

  <!-- Sonar Sweep line -->
  <g class="sonar-sweep">
    <line x1="200" y1="400" x2="200" y2="300" stroke="#f39e37" stroke-width="2.2" stroke-opacity="0.85" filter="url(#glow-amber)" />
    <polygon points="200,400 200,300 215,302" fill="#f39e37" fill-opacity="0.15" />
    <polygon points="200,400 215,302 230,310" fill="#f39e37" fill-opacity="0.05" />
  </g>

  <!-- Alignment crosshairs -->
  <line x1="200" y1="290" x2="200" y2="510" stroke="#6fe5ff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="2,6" />
  <line x1="90" y1="400" x2="310" y2="400" stroke="#6fe5ff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="2,6" />

  <!-- Pulsing Central Sonar Node (Dead-Code signature) -->
  <circle cx="200" cy="400" r="10" fill="#ffffff" class="node-pulse" />

  <!-- Technical border frame -->
  <rect x="15" y="15" width="370" height="570" fill="none" stroke="#6fe5ff" stroke-opacity="0.15" stroke-width="1" />
  <rect x="20" y="20" width="360" height="560" fill="none" stroke="#f39e37" stroke-opacity="0.08" stroke-width="0.5" />

  <!-- Scanning vertical telemetry sweep -->
  <g class="scanner-line">
    <line x1="20" y1="0" x2="380" y2="0" stroke="#6fe5ff" stroke-width="0.8" stroke-opacity="0.3" filter="url(#glow-cyan)" />
  </g>
  
  <!-- Readouts -->
  <g fill="#f39e37" font-family="monospace" font-size="10" opacity="0.85">
    <text x="200" y="550" fill="#f39e37" font-family="'Orbitron', sans-serif" font-weight="700" font-size="11" text-anchor="middle" letter-spacing="2" filter="url(#glow-amber)">ACCESS: LEVEL_DEEP // COGNITIVE_SANCTION</text>
  </g>
</svg>
