<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Purple glow filter -->
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Core radial gradient -->
    <radialGradient id="core-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#00f0ff" />
      <stop offset="70%" stop-color="#be35ff" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <style>
    @keyframes rotate-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotate-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.6)); opacity: 0.8; }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 28px rgba(190, 53, 255, 0.9)); opacity: 1; }
    }
    @keyframes flash {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    .spin-cw {
      transform-origin: 200px 300px;
      animation: rotate-cw 20s infinite linear;
    }
    .spin-ccw {
      transform-origin: 200px 300px;
      animation: rotate-ccw 15s infinite linear;
    }
    .pulse-core-el {
      transform-origin: 200px 300px;
      animation: pulse-core 3s infinite ease-in-out;
    }
    .flashing-grid {
      animation: flash 4s infinite ease-in-out;
    }
  </style>

  <!-- Deep space background -->
  <rect width="100%" height="100%" fill="#04060b" />
  
  <!-- Cybernetic Grid Overlay -->
  <g stroke="#be35ff" stroke-width="0.5" stroke-opacity="0.05" class="flashing-grid">
    <line x1="50" y1="0" x2="50" y2="600" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="150" y1="0" x2="150" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="250" y1="0" x2="250" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="350" y1="0" x2="350" y2="600" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="400" x2="400" y2="400" />
    <line x1="0" y1="500" x2="400" y2="500" />
  </g>

  <!-- Corner HUD brackets -->
  <g stroke="#00f0ff" stroke-width="2" stroke-opacity="0.4" fill="none">
    <path d="M 20,40 L 20,20 L 40,20" />
    <path d="M 380,40 L 380,20 L 360,20" />
    <path d="M 20,560 L 20,580 L 40,580" />
    <path d="M 380,560 L 380,580 L 360,580" />
  </g>

  <!-- Concentric Static HUD Rings -->
  <circle cx="200" cy="300" r="160" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.1" />
  <circle cx="200" cy="300" r="130" fill="none" stroke="#be35ff" stroke-width="1" stroke-dasharray="2,8" stroke-opacity="0.2" />

  <!-- Rotating HUD Elements -->
  <!-- Outer complex ring (CW) -->
  <g class="spin-cw">
    <circle cx="200" cy="300" r="110" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-dasharray="40,20,10,20" stroke-opacity="0.5" filter="url(#glow-cyan)" />
    <!-- Ticks -->
    <path d="M 200,180 L 200,186 M 200,414 L 200,420 M 80,300 L 86,300 M 314,300 L 320,300" stroke="#be35ff" stroke-width="2" stroke-opacity="0.7" />
  </g>

  <!-- Inner complex ring (CCW) -->
  <g class="spin-ccw">
    <circle cx="200" cy="300" r="85" fill="none" stroke="#be35ff" stroke-width="1.5" stroke-dasharray="10,15,40,15" stroke-opacity="0.6" filter="url(#glow-purple)" />
    <circle cx="200" cy="300" r="65" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="5,5" stroke-opacity="0.4" />
  </g>

  <!-- Crosshairs / HUD alignment lines -->
  <g stroke="#00f0ff" stroke-width="1" stroke-opacity="0.2" fill="none">
    <line x1="200" y1="120" x2="200" y2="480" />
    <line x1="20" y1="300" x2="380" y2="300" />
    <!-- Diagonal bracket markers -->
    <path d="M 120,220 L 130,220 L 130,230" />
    <path d="M 280,220 L 270,220 L 270,230" />
    <path d="M 120,380 L 130,380 L 130,370" />
    <path d="M 280,380 L 270,380 L 270,370" />
  </g>

  <!-- Pulsing Engine Core Sphere -->
  <g class="pulse-core-el">
    <circle cx="200" cy="300" r="45" fill="url(#core-grad)" />
    <circle cx="200" cy="300" r="18" fill="#ffffff" filter="url(#glow-cyan)" />
    <circle cx="200" cy="300" r="6" fill="#00f0ff" />
  </g>

  <!-- Diagnostics readout bars -->
  <g fill="none" stroke-linecap="round">
    <path d="M 50,500 L 150,500" stroke="#00f0ff" stroke-width="4" stroke-opacity="0.1" />
    <path d="M 50,500 L 130,500" stroke="#00f0ff" stroke-width="4" filter="url(#glow-cyan)" />
    
    <path d="M 250,500 L 350,500" stroke="#be35ff" stroke-width="4" stroke-opacity="0.1" />
    <path d="M 250,500 L 310,500" stroke="#be35ff" stroke-width="4" filter="url(#glow-purple)" />
  </g>

  <!-- Text interface readout -->
  <g font-family="'Share Tech Mono', monospace" font-size="11" letter-spacing="1">
    <text x="50" y="70" fill="#00f0ff" fill-opacity="0.7">REACTOR STATUS: ONLINE</text>
    <text x="350" y="70" fill="#be35ff" fill-opacity="0.7" text-anchor="end">SYS_CLOCK: SYS_OK</text>
    <text x="50" y="492" fill="#94a3b8">MANA_CORE_OUTPUT: 84%</text>
    <text x="350" y="492" fill="#94a3b8" text-anchor="end">STABILITY: 92%</text>

    <!-- Level-up Rank Badge -->
    <rect x="150" y="140" width="100" height="24" fill="#04060b" stroke="#ffe600" stroke-width="1.5" rx="3" />
    <text x="200" y="156" fill="#ffe600" font-family="'Orbitron', sans-serif" font-weight="900" font-size="12" text-anchor="middle" letter-spacing="2" filter="url(#glow-cyan)">S-RANK</text>

    <!-- Bottom Readout Title -->
    <text x="200" y="535" fill="#00f0ff" font-family="'Orbitron', sans-serif" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="2">ARCANE POWER MAIN CORE</text>
    <text x="200" y="555" fill="#94a3b8" text-anchor="middle" letter-spacing="3">ABYSS: LAYER_09 // CORE</text>
  </g>
</svg>
