<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <!-- Aether blue glow filter -->
    <filter id="glow-aether" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Copper/brass glow filter -->
    <filter id="glow-brass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes float-island {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes pulse-crystal {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 6px #38bdf8); }
      50% { transform: scale(1.1); filter: drop-shadow(0 0 20px #00d4ff); }
    }
    @keyframes expand-resonance {
      0% { r: 10px; opacity: 0.8; }
      100% { r: 110px; opacity: 0; }
    }
    @keyframes steam-rise {
      0% { transform: translateY(0px) translateX(0px) scale(0.6); opacity: 0; }
      15% { opacity: 0.4; }
      80% { opacity: 0.15; }
      100% { transform: translateY(-70px) translateX(15px) scale(1.5); opacity: 0; }
    }
    @keyframes scanline {
      0% { transform: translateY(20px); opacity: 0.15; }
      50% { transform: translateY(560px); opacity: 0.45; }
      100% { transform: translateY(20px); opacity: 0.15; }
    }
    @keyframes lightning-flash {
      0%, 90%, 93%, 95%, 97%, 100% { opacity: 0; }
      91%, 94%, 96% { opacity: 1; filter: drop-shadow(0 0 10px #38bdf8); }
    }
    @keyframes cloud-drift-left {
      0% { transform: translate(450px, 330px); opacity: 0; }
      10%, 90% { opacity: 0.25; }
      100% { transform: translate(-180px, 330px); opacity: 0; }
    }
    @keyframes cloud-drift-right {
      0% { transform: translate(-180px, 220px); opacity: 0; }
      10%, 90% { opacity: 0.2; }
      100% { transform: translate(450px, 220px); opacity: 0; }
    }
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes piston-slide {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(12px); }
    }
    @keyframes arc-flicker {
      0%, 100% { opacity: 0.3; stroke-dasharray: 2, 4; }
      50% { opacity: 1; stroke-dasharray: 4, 1; }
    }
    @keyframes wire-pulse {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -40; }
    }
    
    .floating-group {
      animation: float-island 6s infinite ease-in-out;
    }
    .crystal-pulse {
      transform-origin: 200px 115px;
      animation: pulse-crystal 3s infinite ease-in-out;
    }
    .resonance-circle {
      transform-origin: 200px 115px;
      animation: expand-resonance 4.5s infinite linear;
    }
    .scanner-line {
      animation: scanline 8s infinite ease-in-out;
    }
    .lightning-strike {
      animation: lightning-flash 6s infinite linear;
    }
    .cloud-drift-l {
      animation: cloud-drift-left 25s infinite linear;
    }
    .cloud-drift-r {
      animation: cloud-drift-right 30s infinite linear;
    }
    .steam-puff-1 {
      transform-origin: 142px 260px;
      animation: steam-rise 4.5s infinite linear;
      stroke: #d48c54;
      stroke-opacity: 0.35;
      fill: none;
    }
    .steam-puff-2 {
      transform-origin: 255px 270px;
      animation: steam-rise 3.8s infinite linear;
      animation-delay: 1.5s;
      stroke: #d48c54;
      stroke-opacity: 0.4;
      fill: none;
    }
    .steam-puff-3 {
      transform-origin: 185px 220px;
      animation: steam-rise 5.5s infinite linear;
      animation-delay: 2.7s;
      stroke: #d48c54;
      stroke-opacity: 0.3;
      fill: none;
    }
    .spin-clockwise {
      animation: spin-cw 12s infinite linear;
    }
    .spin-counter-clockwise {
      animation: spin-ccw 10s infinite linear;
    }
    .piston-moving {
      animation: piston-slide 2s infinite ease-in-out;
    }
    .electric-arc {
      animation: arc-flicker 0.4s infinite linear;
    }
    .aether-wire {
      stroke-dasharray: 6, 10;
      animation: wire-pulse 2s infinite linear;
    }
  </style>

  <!-- Aged brass blueprint grid background -->
  <rect width="100%" height="100%" fill="#120d09" />
  
  <!-- Blueprint Grid lines -->
  <g stroke="#d48c54" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="350" x2="400" y2="350" />
    <line x1="0" y1="400" x2="400" y2="400" />
    <line x1="0" y1="450" x2="400" y2="450" />
    <line x1="0" y1="500" x2="400" y2="500" />
    <line x1="0" y1="550" x2="400" y2="550" />
    
    <line x1="50" y1="0" x2="50" y2="600" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="150" y1="0" x2="150" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="250" y1="0" x2="250" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="350" y1="0" x2="350" y2="600" />
  </g>

  <!-- Technical border frame -->
  <rect x="15" y="15" width="370" height="570" fill="none" stroke="#d48c54" stroke-opacity="0.2" stroke-width="1" />
  <rect x="20" y="20" width="360" height="560" fill="none" stroke="#d48c54" stroke-opacity="0.1" stroke-width="0.5" />

  <!-- Drifting Background Clouds -->
  <path d="M -80,0 C -60,-12 -30,-12 -10,0 C 10,-8 35,-8 45,0 C 55,-4 75,-4 85,0 L 85,8 L -80,8 Z" fill="none" stroke="#d48c54" stroke-opacity="0.1" stroke-width="1" class="cloud-drift-l" />
  <path d="M -80,0 C -60,-12 -30,-12 -10,0 C 10,-8 35,-8 45,0 C 55,-4 75,-4 85,0 L 85,8 L -80,8 Z" fill="none" stroke="#d48c54" stroke-opacity="0.08" stroke-width="1" class="cloud-drift-r" />

  <!-- Storm layer (shattered earth environment) at the bottom -->
  <g fill="#16100c" stroke="#d48c54" stroke-opacity="0.2" stroke-width="1">
    <!-- Behind darker cloud layer -->
    <path d="M 15,570 C 60,515 120,520 160,545 C 200,505 270,505 310,540 C 340,510 370,520 385,570 Z" fill="#0d0906" fill-opacity="0.95" stroke-opacity="0.1" />
    <!-- Front cloud layer -->
    <path d="M 15,570 C 50,535 100,535 130,555 C 160,525 220,525 250,550 C 280,520 340,520 385,570 Z" fill-opacity="0.85" />
  </g>

  <!-- Crackling Storm Lightning -->
  <path d="M 105,540 L 98,552 L 108,560 L 102,572 L 105,578" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" class="lightning-strike" style="animation-delay: 0.8s;" />
  <path d="M 285,535 L 290,548 L 278,558 L 292,571 L 285,580" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" class="lightning-strike" style="animation-delay: 3.5s; animation-duration: 4.8s;" />

  <!-- Animated floating group containing the island and spires -->
  <g class="floating-group">
    
    <!-- Steam vents/exhaust rises from spires -->
    <path d="M 142,260 Q 130,230 150,210 T 135,170" class="steam-puff-1" />
    <path d="M 255,270 Q 270,240 250,220 T 265,180" class="steam-puff-2" />
    <path d="M 185,220 Q 175,190 195,170 T 180,130" class="steam-puff-3" />

    <!-- Spire & Island vector lineart -->
    <g stroke="#d48c54" stroke-opacity="0.75" stroke-width="1.5" fill="none">
      <!-- Spires -->
      <rect x="180" y="220" width="40" height="80" />
      <polygon points="175,220 200,160 225,220" />
      <rect x="130" y="260" width="25" height="40" />
      <rect x="245" y="270" width="20" height="30" />
      
      <!-- Spire mechanical details -->
      <line x1="200" y1="160" x2="200" y2="300" stroke-opacity="0.3" />
      <line x1="142" y1="260" x2="142" y2="300" stroke-opacity="0.3" />
      <line x1="255" y1="270" x2="255" y2="300" stroke-opacity="0.3" />

      <!-- Island top line -->
      <line x1="90" y1="300" x2="310" y2="300" stroke-width="2" />
      
      <!-- Island Underbelly rock structures -->
      <polygon points="90,300 310,300 270,385 200,440 130,385" />
      <line x1="200" y1="300" x2="200" y2="440" stroke-opacity="0.3" />
      <line x1="130" y1="385" x2="200" y2="300" stroke-opacity="0.3" />
      <line x1="270" y1="385" x2="200" y2="300" stroke-opacity="0.3" />
      
      <!-- Hanging anchor cables -->
      <path d="M 120,320 Q 110,380 95,440" stroke-opacity="0.4" />
      <path d="M 280,320 Q 290,380 305,440" stroke-opacity="0.4" />
    </g>

    <!-- Glowing Aether Conduits on Underbelly rock -->
    <path d="M 130,385 L 200,440 L 270,385" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.35" class="aether-wire" filter="url(#glow-aether)" />

    <!-- Steampunk piston engine at bottom of the island -->
    <g stroke="#d48c54" stroke-opacity="0.75" stroke-width="1.5" fill="none">
      <!-- Piston cylinder -->
      <rect x="195" y="440" width="10" height="24" fill="#120d09" />
      <!-- Moving piston rod -->
      <g class="piston-moving">
        <line x1="200" y1="450" x2="200" y2="480" stroke="#d48c54" stroke-width="3" stroke-linecap="round" />
      </g>
    </g>

    <!-- Meshed propulsion gears rotating -->
    <g class="spin-clockwise" style="transform-origin: 200px 480px; animation-duration: 6s;">
      <circle cx="200" cy="480" r="14" stroke="#d48c54" stroke-dasharray="3,3" stroke-width="1.5" fill="none" stroke-opacity="0.6" />
      <line x1="186" y1="480" x2="214" y2="480" stroke="#d48c54" stroke-opacity="0.4" />
      <line x1="200" y1="466" x2="200" y2="494" stroke="#d48c54" stroke-opacity="0.4" />
    </g>
    <g class="spin-counter-clockwise" style="transform-origin: 224px 480px; animation-duration: 4.29s;">
      <circle cx="224" cy="480" r="10" stroke="#d48c54" stroke-dasharray="2,2" stroke-width="1.5" fill="none" stroke-opacity="0.5" />
      <line x1="214" y1="480" x2="234" y2="480" stroke="#d48c54" stroke-opacity="0.3" />
      <line x1="224" y1="470" x2="224" y2="490" stroke="#d48c54" stroke-opacity="0.3" />
    </g>

    <!-- Floating Aether Crystal Spire Core -->
    <g class="crystal-pulse">
      <!-- Glowing core crystal -->
      <polygon points="200,85 208,115 200,145 192,115" fill="#38bdf8" fill-opacity="0.25" stroke="#38bdf8" stroke-width="2" filter="url(#glow-aether)" />
      <polygon points="200,95 204,115 200,135 196,115" fill="#ffffff" fill-opacity="0.9" />
    </g>

    <!-- Orbiting crystal shard 1 -->
    <g class="spin-clockwise" style="transform-origin: 200px 115px; animation-duration: 8s;">
      <polygon points="175,107 178,115 175,123 172,115" fill="#38bdf8" fill-opacity="0.4" stroke="#38bdf8" stroke-width="1" filter="url(#glow-aether)" />
    </g>
    <!-- Orbiting crystal shard 2 -->
    <g class="spin-counter-clockwise" style="transform-origin: 200px 115px; animation-duration: 10s;">
      <polygon points="225,107 228,115 225,123 222,115" fill="#38bdf8" fill-opacity="0.4" stroke="#38bdf8" stroke-width="1" filter="url(#glow-aether)" />
    </g>
    <!-- Crystal Shard Orbit path line -->
    <circle cx="200" cy="115" r="25" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="0.75" stroke-dasharray="2,4" fill="none" />

    <!-- Aetheric energy crackling arcs between core and spire tip -->
    <path d="M 200,145 L 198,150 L 202,154 L 200,160" stroke="#38bdf8" stroke-width="1.5" class="electric-arc" filter="url(#glow-aether)" />

    <!-- Expanding circular resonance fields -->
    <circle cx="200" cy="115" r="25" fill="none" stroke="#38bdf8" stroke-width="1.5" class="resonance-circle" filter="url(#glow-aether)" />
    <circle cx="200" cy="115" r="25" fill="none" stroke="#38bdf8" stroke-width="0.75" stroke-dasharray="4,6" class="resonance-circle" style="animation-delay: 2.25s;" />

  </g>

  <!-- Technical scanner sweep overlay -->
  <g class="scanner-line">
    <line x1="20" y1="0" x2="380" y2="0" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3" filter="url(#glow-aether)" />
    <circle cx="200" cy="0" r="2.5" fill="#ffffff" filter="url(#glow-aether)" />
  </g>

  <!-- Technical telemetry and calibration readouts -->
  <g fill="#d48c54" font-family="monospace" font-size="10" opacity="0.8">
    <!-- Grid markings -->
    <text x="30" y="45" opacity="0.5">X: 140.24</text>
    <text x="30" y="60" opacity="0.5">Y: 890.11</text>
    
    <text x="370" y="45" opacity="0.5" text-anchor="end">SYS_STATUS: ACTIVE</text>
    <text x="370" y="60" opacity="0.5" text-anchor="end">LIFT_SYS: STABLE</text>

    <!-- Project labels -->
    <text x="200" y="512" text-anchor="middle" font-family="'Orbitron', sans-serif" font-weight="700" letter-spacing="2">PROJECT: AZMER_SPIRE_V</text>
    <text x="200" y="530" text-anchor="middle" font-size="8.5" opacity="0.6" letter-spacing="1">ALTITUDE: 11,200 FT // PRESSURE: 4.2 BAR</text>
    <text x="200" y="548" text-anchor="middle" font-size="8.5" fill="#38bdf8" opacity="0.9" letter-spacing="1" filter="url(#glow-aether)">AETHER RESONANCE: 94.6% ACTIVE</text>
  </g>
</svg>
