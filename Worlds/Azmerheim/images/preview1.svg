<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <!-- Aged brass blueprint grid background -->
  <rect width="100%" height="100%" fill="#120d09" />
  
  <!-- Perspective grids & schematics -->
  <g stroke="#d48c54" stroke-opacity="0.15" stroke-width="1">
    <!-- Grid pattern -->
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="350" x2="400" y2="350" />
    <line x1="0" y1="400" x2="400" y2="400" />
    <line x1="0" y1="450" x2="400" y2="450" />
    <line x1="0" y1="500" x2="400" y2="500" />
    <line x1="0" y1="550" x2="400" y2="550" />
    
    <line x1="50" y1="0" x2="50" y2="600" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="150" y1="0" x2="150" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="250" y1="0" x2="250" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="350" y1="0" x2="350" y2="600" />
  </g>
  
  <!-- Floating Island Vector Lineart -->
  <g stroke="#d48c54" stroke-opacity="0.6" stroke-width="1.5" fill="none">
    <!-- Island Top -->
    <line x1="100" y1="300" x2="300" y2="300" />
    <!-- Spire structures -->
    <rect x="180" y="220" width="40" height="80" />
    <polygon points="175,220 200,160 225,220" />
    <rect x="130" y="260" width="25" height="40" />
    <rect x="245" y="270" width="20" height="30" />
    
    <!-- Island Underbelly stone -->
    <polygon points="100,300 300,300 270,380 200,430 130,380" />
    <line x1="200" y1="300" x2="200" y2="430" stroke-opacity="0.3" />
    <line x1="130" y1="380" x2="200" y2="300" stroke-opacity="0.3" />
    <line x1="270" y1="380" x2="200" y2="300" stroke-opacity="0.3" />
  </g>

  <!-- Glowing magical crystal vector in center -->
  <g stroke="#38bdf8" stroke-width="1.5" fill="#38bdf8" fill-opacity="0.1">
    <polygon points="200,100 208,125 200,150 192,125" />
    <!-- Radiating forcefields -->
    <circle cx="200" cy="125" r="25" stroke-dasharray="3 3" fill="none" stroke-opacity="0.4" />
    <circle cx="200" cy="125" r="45" stroke-dasharray="5 5" fill="none" stroke-opacity="0.2" />
  </g>

  <!-- Tech labels and measurements -->
  <g fill="#d48c54" font-family="monospace" font-size="10" opacity="0.8">
    <text x="200" y="470" text-anchor="middle" letter-spacing="1">PROJECT: AZMER_SPIRE_V</text>
    <text x="200" y="490" text-anchor="middle" font-size="8" opacity="0.6">ALTITUDE: 11,200 FT // PRESSURE: 4.2 BAR</text>
    <text x="200" y="510" text-anchor="middle" font-size="8" fill="#38bdf8" opacity="0.9">AETHER RESONANCE: 94.6% ACTIVE</text>
  </g>
</svg>
