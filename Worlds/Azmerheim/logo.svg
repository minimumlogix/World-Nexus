<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="world-svg-logo">
  <style>
    .copper-stroke {
      stroke: var(--primary-accent, #d48c54);
      fill: none;
    }
    .copper-fill {
      fill: var(--primary-accent, #d48c54);
    }
    .crystal-stroke {
      stroke: var(--accent, #38bdf8);
      fill: none;
    }
    .crystal-fill {
      fill: var(--accent, #38bdf8);
    }
    .spin-gear {
      animation: spin 35s linear infinite;
      transform-origin: 50px 50px;
    }
    .spin-gear-reverse {
      animation: spin-reverse 20s linear infinite;
      transform-origin: 50px 50px;
    }
    .crystal-pulse {
      animation: pulse 2.5s ease-in-out infinite alternate;
      transform-origin: 50px 50px;
      filter: drop-shadow(0 0 4px var(--accent, #38bdf8));
    }
    .steam-drift {
      animation: drift 4s ease-in-out infinite alternate;
      transform-origin: 50px 50px;
      opacity: 0.6;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      100% { transform: rotate(-360deg); }
    }
    @keyframes pulse {
      0% { transform: scale(0.92); opacity: 0.8; }
      100% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 8px var(--accent, #38bdf8)); }
    }
    @keyframes drift {
      0% { transform: translateY(0) scale(1); opacity: 0.3; }
      100% { transform: translateY(-3px) scale(1.05); opacity: 0.7; }
    }
  </style>

  <!-- Background concentric circles / steam pressure dial markings -->
  <circle class="copper-stroke" cx="50" cy="50" r="47" style="stroke-width: 0.5; opacity: 0.3; stroke-dasharray: 1 3;" />
  <circle class="copper-stroke" cx="50" cy="50" r="43" style="stroke-width: 0.5; opacity: 0.4;" />

  <!-- Steam Clouds / Air Currents (Background) -->
  <path class="copper-stroke steam-drift" d="M25,28 Q15,35 22,42 Q32,45 35,38 Z M75,28 Q85,35 78,42 Q68,45 65,38 Z" style="stroke-width: 0.75;" />

  <!-- Outer Main Clockwork Gear (Rotating) -->
  <g class="spin-gear">
    <!-- Gear Rim -->
    <circle class="copper-stroke" cx="50" cy="50" r="38" style="stroke-width: 1.5;" />
    <circle class="copper-stroke" cx="50" cy="50" r="32" style="stroke-width: 1;" />
    
    <!-- Gear Teeth (12 teeth) -->
    <g class="copper-fill">
      <path d="M48,8 L52,8 L53,13 L47,13 Z" />
      <path d="M48,87 L52,87 L53,92 L47,92 Z" transform="rotate(180 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(30 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(60 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(90 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(120 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(150 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(210 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(240 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(270 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(300 50 50)" />
      <path d="M48,8 L52,8 L53,13 L47,13 Z" transform="rotate(330 50 50)" />
    </g>

    <!-- Gear Spokes -->
    <g class="copper-stroke" style="stroke-width: 1.5; opacity: 0.8;">
      <line x1="50" y1="13" x2="50" y2="87" />
      <line x1="13" y1="50" x2="87" y2="50" />
    </g>
  </g>

  <!-- Inner Reverse Rotating Escapement Wheel -->
  <g class="spin-gear-reverse">
    <circle class="copper-stroke" cx="50" cy="50" r="26" style="stroke-width: 0.75; stroke-dasharray: 4 2;" />
    <polygon class="copper-stroke" points="50,26 62,38 50,50 38,38" style="stroke-width: 0.5; opacity: 0.5;" />
    <polygon class="copper-stroke" points="50,74 62,62 50,50 38,62" style="stroke-width: 0.5; opacity: 0.5;" />
  </g>

  <!-- Floating Sky-City / Island Silhouette in the Center -->
  <g>
    <!-- Floating Island Bottom Rock Foundation -->
    <polygon class="copper-fill" points="30,52 70,52 64,64 50,72 36,64" style="opacity: 0.95;" />
    <!-- Rock texture details -->
    <polygon class="copper-stroke" points="36,64 50,52 64,64" style="stroke-width: 0.5; opacity: 0.4;" />
    <line x1="50" y1="52" x2="50" y2="72" class="copper-stroke" style="stroke-width: 0.5; opacity: 0.4;" />

    <!-- Sky-City Buildings / Domes on top of the island -->
    <!-- Brass Dome -->
    <path class="copper-fill" d="M42,52 A8,8 0 0,1 58,52 Z" />
    <!-- Clocktower Spire -->
    <rect class="copper-fill" x="48" y="32" width="4" height="20" />
    <polygon class="copper-fill" points="47,32 50,23 53,32" />
    <!-- Small buildings -->
    <rect class="copper-fill" x="35" y="44" width="6" height="8" />
    <rect class="copper-fill" x="59" y="46" width="6" height="6" />
    <polygon class="copper-fill" points="34,44 38,39 42,44" />
  </g>

  <!-- Glowing Magical Crystal (Pulses in center of the spire) -->
  <g class="crystal-pulse">
    <!-- Rhombus Crystal shape sitting inside the main Spire -->
    <polygon class="crystal-fill" points="50,28 53.5,36 50,44 46.5,36" />
    <!-- Shiny facet line -->
    <line x1="50" y1="28" x2="50" y2="44" class="crystal-stroke" style="stroke-width: 0.5; opacity: 0.8; stroke: #ffffff;" />
  </g>
</svg>
